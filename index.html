<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Daily Scout | Final Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <header class="bg-slate-900 text-white p-6 shadow-xl no-print">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-xl font-black italic tracking-tighter">MLB<span class="text-sky-400">DATA</span>SCOUT</h1>
                <p class="text-[10px] text-slate-400 font-mono">Netlify Serverless Edition</p>
            </div>
            <div class="flex items-center gap-3">
                <input type="date" id="datePicker" class="text-slate-900 p-2 rounded font-bold text-sm outline-none">
                <button onclick="fetchGames()" class="bg-sky-500 hover:bg-sky-600 px-6 py-2 rounded-full font-bold shadow-lg transition transform active:scale-95">Process Date</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <div id="status" class="hidden mb-6 p-4 rounded-lg bg-sky-100 text-sky-800 text-center animate-pulse font-bold">Syncing with Netlify...</div>

        <section id="rawDumpSection" class="hidden mb-12">
            <div class="flex justify-between items-end mb-2">
                <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">AI Raw Data Buffer</h2>
                <button onclick="copyRaw()" class="text-xs font-bold text-sky-600 uppercase tracking-tighter">Copy All Content →</button>
            </div>
            <textarea id="rawTextArea" class="w-full h-64 p-4 text-[11px] font-mono bg-slate-800 text-slate-300 rounded-xl border-none shadow-inner" readonly></textarea>
        </section>

        <div id="gamesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <script>
        const d = new Date(); d.setDate(d.getDate() - 1);
        document.getElementById('datePicker').value = d.toISOString().split('T')[0];

        function copyRaw() { 
            const el = document.getElementById('rawTextArea');
            el.select(); 
            document.execCommand('copy'); 
            alert("Ready for AI processing!"); 
        }

        async function fetchGames() {
            const date = document.getElementById('datePicker').value;
            const status = document.getElementById('status');
            const container = document.getElementById('gamesContainer');
            const rawText = document.getElementById('rawTextArea');
            
            // Your Site URL
            const SITE_URL = "https://my-mlb-report.netlify.app"; 
            
            status.classList.remove('hidden');
            container.innerHTML = '';
            document.getElementById('rawDumpSection').classList.add('hidden');

            try {
                const response = await fetch(`${SITE_URL}/.netlify/functions/get-mlb?date=${date}`);
                const games = await response.json();

                let buffer = `MLB SCOUT REPORT: ${date}\n==============================\n`;

                games.forEach(game => {
                    // Update Buffer
                    buffer += `\n[GAME]: ${game.headline}\n`;
                    buffer += `[VENUE]: ${game.venue}\n`;
                    buffer += `[RECORDS]: ${game.teams.away.name} (${game.teams.away.record}) @ ${game.teams.home.name} (${game.teams.home.record})\n`;
                    buffer += `[SCORE]: ${game.teams.away.score} - ${game.teams.home.score}\n`;
                    buffer += `[STORY]: ${game.narrative}\n`;
                    buffer += `------------------------------\n`;

                    // Update UI Card
                    const card = document.createElement('div');
                    card.className = "bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col";
                    card.innerHTML = `
                        <div class="bg-slate-50 p-3 border-b text-[9px] font-black text-slate-400 flex justify-between uppercase">
                            <span>${game.status}</span>
                            <span>${game.venue}</span>
                        </div>
                        <div class="p-6 flex-grow">
                            <div class="flex justify-between items-center mb-6">
                                <div class="text-center w-5/12">
                                    <p class="text-[9px] text-slate-400 font-bold mb-1">${game.teams.away.record}</p>
                                    <p class="text-xs font-black truncate">${game.teams.away.name}</p>
                                    <p class="text-4xl font-black tracking-tighter">${game.teams.away.score}</p>
                                </div>
                                <div class="text-slate-100 font-black italic text-xl">VS</div>
                                <div class="text-center w-5/12">
                                    <p class="text-[9px] text-slate-400 font-bold mb-1">${game.teams.home.record}</p>
                                    <p class="text-xs font-black truncate">${game.teams.home.name}</p>
                                    <p class="text-4xl font-black tracking-tighter">${game.teams.home.score}</p>
                                </div>
                            </div>
                            <div class="border-t pt-4 space-y-2">
                                <p class="text-[10px] text-slate-500"><strong>P:</strong> ${game.teams.away.pitcher} / ${game.teams.home.pitcher}</p>
                                <p class="text-[11px] text-slate-600 italic border-l-2 border-sky-400 pl-2 line-clamp-2">${game.headline}</p>
                            </div>
                        </div>
                        <a href="https://www.mlb.com/gameday/${game.id}" target="_blank" class="block w-full bg-slate-900 text-white text-center py-3 text-[10px] font-bold hover:bg-sky-600 transition">GO TO GAMEDAY</a>
                    `;
                    container.appendChild(card);
                });

                rawText.value = buffer;
                document.getElementById('rawDumpSection').classList.remove('hidden');
                status.classList.add('hidden');

            } catch (err) {
                status.innerText = "Error syncing data. Check Netlify logs.";
                console.error(err);
            }
        }
    </script>
</body>
</html>
