<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB SEASON TRACKER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');

        :root {
            --panel: rgba(18, 20, 38, 0.85); /* Increased transparency */
            --page-bg: #daecee;
            --border: rgba(34, 211, 238, 0.4);
            --accent: #22d3ee;
            --text-light: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--page-bg);
            /* Linear gradient background to show off transparency */
            background: linear-gradient(135deg, #daecee 0%, #b8d9de 100%);
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 0;
            padding: 20px;
            color: var(--text-light);
        }

        .container { max-width: 1200px; margin: 0 auto; }

        /* Translucent Panel Style */
        .panel {
            background-color: var(--panel);
            backdrop-filter: blur(10px); /* See-through blur effect */
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Banner Buttons */
        .team-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
        }

        .team {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 6px 12px;
            font-size: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .team.active {
            background-color: var(--accent);
            color: #121426;
            border-color: var(--accent);
        }

        /* Schedule Section */
        .horizontal-scroll {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .game-card {
            min-width: 200px;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .game-card.active { border-color: var(--accent); background: rgba(34, 211, 238, 0.1); }

        /* Stats Table */
        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: var(--accent);
        }

        .game-notes {
            background: rgba(34, 211, 238, 0.1);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            margin-bottom: 20px;
            text-transform: none; /* Keep notes readable */
            font-family: sans-serif;
            border-left: 4px solid var(--accent);
        }

        .player-row {
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .player-header { display: flex; justify-content: space-between; align-items: center; }

        .highlight { border-left: 4px solid var(--accent); padding-left: 10px; }
        .highlight .name { color: var(--accent); font-weight: 900; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 10px;
            margin-top: 8px;
            text-transform: none;
            font-family: sans-serif;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .stat-item b { color: var(--text-light); margin-left: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div id="teamContainer" class="team-buttons"></div>
    </div>

    <div class="panel">
        <div class="section-title">☁️ Available Games (Last 7 Days)</div>
        <div id="gamesList" class="horizontal-scroll"></div>
    </div>

    <div class="panel">
        <div class="section-title">☁️ Player Day (Season Statistics)</div>
        <div id="gameNotes" class="game-notes"></div>
        <div id="playersList"></div>
    </div>
</div>

<script type="module">
    import { highlightedPlayers } from './highlights.js';

    const teamMap = {
        "ARI": "Diamondbacks", "ATH": "Athletics", "ATL": "Braves", "BAL": "Orioles",
        "BOS": "Red Sox", "ChC": "Cubs", "ChW": "White Sox", "Cin": "Reds",
        "Cle": "Guardians", "Col": "Rockies", "Det": "Tigers", "Hou": "Astros",
        "KCR": "Royals", "LAA": "Angels", "LAD": "Dodgers", "Mia": "Marlins",
        "Mil": "Brewers", "Min": "Twins", "NYM": "Mets", "NYY": "Yankees",
        "Phi": "Phillies", "Pit": "Pirates", "SDP": "Padres", "SFG": "Giants",
        "Sea": "Mariners", "StL": "Cardinals", "Tam": "Rays", "Tex": "Rangers",
        "Tor": "Blue Jays", "Was": "Nationals"
    };

    let fullSchedule = null;

    async function init() {
        const today = new Date().toISOString().split('T')[0];
        const lastWeek = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
        
        // Session Cache
        const cached = sessionStorage.getItem('mlb_full_schedule');
        if (cached) {
            fullSchedule = JSON.parse(cached);
        } else {
            const resp = await fetch(`/.netlify/functions/get-schedule?startDate=${lastWeek}&endDate=${today}`);
            fullSchedule = await resp.json();
            sessionStorage.setItem('mlb_full_schedule', JSON.stringify(fullSchedule));
        }
        
        setupButtons();
        loadTeamData("ARI");
    }

    function setupButtons() {
        const container = document.getElementById('teamContainer');
        Object.keys(teamMap).forEach(code => {
            const btn = document.createElement('div');
            btn.className = 'team' + (code === "ARI" ? ' active' : '');
            btn.innerText = code;
            btn.onclick = () => {
                document.querySelectorAll('.team').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadTeamData(code);
            };
            container.appendChild(btn);
        });
    }

    function loadTeamData(teamCode) {
        const teamName = teamMap[teamCode];
        const allGames = fullSchedule.dates ? fullSchedule.dates.flatMap(d => d.games) : [];
        const teamGames = allGames.filter(g => 
            g.teams.home.team.name.includes(teamName) || g.teams.away.team.name.includes(teamName)
        ).sort((a,b) => new Date(b.gameDate) - new Date(a.gameDate));

        const gamesList = document.getElementById('gamesList');
        gamesList.innerHTML = "";

        teamGames.forEach((g, idx) => {
            const card = document.createElement('div');
            card.className = `game-card ${idx === 0 ? 'active' : ''}`;
            card.innerHTML = `
                <div style="font-size:10px; color:var(--accent)">${new Date(g.gameDate).toLocaleDateString()}</div>
                <div style="margin:5px 0">${g.teams.away.team.name} @ ${g.teams.home.team.name}</div>
                <div style="font-size:12px">Score: ${g.teams.away.score || 0}-${g.teams.home.score || 0}</div>
            `;
            card.onclick = () => {
                document.querySelectorAll('.game-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                fetchDetails(g.gamePk, teamCode);
            };
            gamesList.appendChild(card);
        });

        if(teamGames.length > 0) fetchDetails(teamGames[0].gamePk, teamCode);
    }

    async function fetchDetails(gamePk, teamCode) {
        const resp = await fetch(`/.netlify/functions/get-game-details?gamePk=${gamePk}`);
        const data = await resp.json();
        
        // 1. Handle Notes & Summary
        const notesEl = document.getElementById('gameNotes');
        // Extracting note from boxscore or plays node
        const note = data.boxscore.info.find(i => i.label === "Note")?.value || "NO SPECIFIC GAME NOTES AVAILABLE.";
        notesEl.innerText = `GAME SUMMARY: ${note}`;

        // 2. Render Players
        const side = data.boxscore.teams.home.team.name.includes(teamMap[teamCode]) ? 'home' : 'away';
        const players = data.boxscore.teams[side].players;
        const listEl = document.getElementById('playersList');
        listEl.innerHTML = "";

        Object.values(players).forEach(p => {
            const isHighlighted = highlightedPlayers[teamCode]?.some(h => p.person.fullName.includes(h));
            const isPitcher = p.position.abbreviation === 'P';
            const s = isPitcher ? p.seasonStats.pitching : p.seasonStats.batting;

            const div = document.createElement('div');
            div.className = `player-row ${isHighlighted ? 'highlight' : ''}`;
            
            let statsHtml = isPitcher ? `
                <div class="stat-item">ERA<b>${s.era}</b></div>
                <div class="stat-item">IP<b>${s.inningsPitched}</b></div>
                <div class="stat-item">W-L<b>${s.wins}-${s.losses}</b></div>
                <div class="stat-item">SV<b>${s.saves}</b></div>
                <div class="stat-item">CG<b>${s.completeGames}</b></div>
                <div class="stat-item">SHO<b>${s.shutouts}</b></div>
            ` : `
                <div class="stat-item">AVG<b>${s.avg}</b></div>
                <div class="stat-item">HR<b>${s.homeRuns}</b></div>
                <div class="stat-item">RBI<b>${s.rbi}</b></div>
                <div class="stat-item">HITS<b>${s.hits}</b></div>
            `;

            div.innerHTML = `
                <div class="player-header">
                    <span class="name">#${p.jerseyNumber} ${p.person.fullName}</span>
                    <span style="font-size:10px; opacity:0.6">${p.position.name}</span>
                </div>
                <div class="stats-grid">${statsHtml}</div>
            `;
            listEl.appendChild(div);
        });
    }

    init();
</script>
</body>
</html>
