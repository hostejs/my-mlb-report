<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB SEASON TRACKER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');

        :root {
            --panel: rgba(18, 20, 38, 0.85);
            --page-bg: #daecee;
            --accent: #22d3ee;
            --accent-trans: rgba(34, 211, 238, 0.1);
            --border: rgba(34, 211, 238, 0.4);
            --text-light: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            background: linear-gradient(135deg, #daecee 0%, #b8d9de 100%);
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin: 0; padding: 20px; color: var(--text-light);
        }

        .container { max-width: 1000px; margin: 0 auto; }

        /* GLOBAL PANEL STYLE - Applied to every container */
        .panel {
            background-color: var(--panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Banner Buttons */
        .team-buttons { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .team {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 6px 10px;
            font-size: 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        .team.active { background-color: var(--accent); color: #121426; }

        /* Game List - Vertical Stack */
        .game-list { display: flex; flex-direction: column; gap: 8px; }
        .game-row {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
            background: rgba(255, 255, 255, 0.03);
        }
        .game-row:hover { background: var(--accent-trans); }
        .game-row.active { 
            border-color: var(--accent); 
            background: var(--accent-trans); 
        }

        /* Player Display */
        .section-header { color: var(--accent); margin: 20px 0 10px 0; font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .player-line {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.75rem;
            line-height: 1.4;
        }
        .highlight { color: var(--accent); font-weight: 900; border-left: 3px solid var(--accent); padding-left: 8px; }
        .stat-label { color: var(--text-muted); font-size: 0.7rem; margin-right: 2px; }
        .stat-value { color: var(--text-light); margin-right: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div id="teamContainer" class="team-buttons"></div>
    </div>

    <div class="panel">
        <div class="section-header">☁️ Schedule (Last 7 Days + Tomorrow)</div>
        <div id="gamesList" class="game-list"></div>
    </div>

    <div class="panel">
        <div class="section-header">☁️ Team Roster & Season Stats</div>
        <div id="playersList"></div>
    </div>
</div>

<script type="module">
    import { highlightedPlayers } from './highlights.js';

    const teamMap = {
        "ARI": { name: "Diamondbacks", id: 109 }, "ATH": { name: "Athletics", id: 133 },
        "ATL": { name: "Braves", id: 144 }, "BAL": { name: "Orioles", id: 110 },
        "BOS": { name: "Red Sox", id: 111 }, "ChC": { name: "Cubs", id: 112 },
        "ChW": { name: "White Sox", id: 145 }, "Cin": { name: "Reds", id: 113 },
        "Cle": { name: "Guardians", id: 114 }, "Col": { name: "Rockies", id: 115 },
        "Det": { name: "Tigers", id: 116 }, "Hou": { name: "Astros", id: 117 },
        "KCR": { name: "Royals", id: 118 }, "LAA": { name: "Angels", id: 108 },
        "LAD": { name: "Dodgers", id: 119 }, "Mia": { name: "Marlins", id: 146 },
        "Mil": { name: "Brewers", id: 158 }, "Min": { name: "Twins", id: 142 },
        "NYM": { name: "Mets", id: 121 }, "NYY": { name: "Yankees", id: 147 },
        "Phi": { name: "Phillies", id: 143 }, "Pit": { name: "Pirates", id: 134 },
        "SDP": { name: "Padres", id: 135 }, "SFG": { name: "Giants", id: 137 },
        "Sea": { name: "Mariners", id: 136 }, "StL": { name: "Cardinals", id: 138 },
        "Tam": { name: "Rays", id: 139 }, "Tex": { name: "Rangers", id: 140 },
        "Tor": { name: "Blue Jays", id: 141 }, "Was": { name: "Nationals", id: 120 }
    };

    let fullSchedule = null;

    async function init() {
        // Date Logic: Tomorrow and 7 days back
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        const endStr = tomorrow.toISOString().split('T')[0];
        
        const lastWeek = new Date();
        lastWeek.setDate(lastWeek.getDate() - 7);
        const startStr = lastWeek.toISOString().split('T')[0];
        
        const cached = sessionStorage.getItem('mlb_full_schedule');
        if (cached) {
            fullSchedule = JSON.parse(cached);
        } else {
            const resp = await fetch(`/.netlify/functions/get-schedule?startDate=${startStr}&endDate=${endStr}`);
            fullSchedule = await resp.json();
            sessionStorage.setItem('mlb_full_schedule', JSON.stringify(fullSchedule));
        }
        
        setupButtons();
        loadTeamData("ARI");
    }

    function setupButtons() {
        const container = document.getElementById('teamContainer');
        Object.keys(teamMap).forEach(code => {
            const btn = document.createElement('div');
            btn.className = 'team' + (code === "ARI" ? ' active' : '');
            btn.innerText = code;
            btn.onclick = () => {
                document.querySelectorAll('.team').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadTeamData(code);
            };
            container.appendChild(btn);
        });
    }

    function loadTeamData(teamCode) {
        const teamInfo = teamMap[teamCode];
        const allGames = fullSchedule.dates ? fullSchedule.dates.flatMap(d => d.games) : [];
        const teamGames = allGames.filter(g => 
            g.teams.home.team.name.includes(teamInfo.name) || g.teams.away.team.name.includes(teamInfo.name)
        ).sort((a,b) => new Date(b.gameDate) - new Date(a.gameDate));

        const gamesList = document.getElementById('gamesList');
        gamesList.innerHTML = "";

        teamGames.forEach((g, idx) => {
            const row = document.createElement('div');
            row.className = `game-row ${idx === 0 ? 'active' : ''}`;
            const gDate = new Date(g.gameDate).toLocaleDateString('en-US', {month:'numeric', day:'numeric', year:'numeric'});
            row.innerText = `${gDate} ${g.teams.away.team.name} ${g.teams.away.score || 0} @ ${g.teams.home.team.name} ${g.teams.home.score || 0}`;
            
            row.onclick = () => {
                document.querySelectorAll('.game-row').forEach(c => c.classList.remove('active'));
                row.classList.add('active');
                fetchDetails(g.gamePk, teamCode);
            };
            gamesList.appendChild(row);
        });

        if(teamGames.length > 0) fetchDetails(teamGames[0].gamePk, teamCode);
    }

    async function fetchDetails(gamePk, teamCode) {
        const teamId = teamMap[teamCode].id;
        // Call Function #2 with teamId included
        const resp = await fetch(`/.netlify/functions/get-game-details?gamePk=${gamePk}&teamId=${teamId}`);
        const data = await resp.json();
        
        const listEl = document.getElementById('playersList');
        listEl.innerHTML = "";

        // Separate and Sort
        const pitchers = data.players.filter(p => p.pitching).sort((a,b) => {
            if (b.pitching.gamesStarted !== a.pitching.gamesStarted) return b.pitching.gamesStarted - a.pitching.gamesStarted;
            return a.fullName.localeCompare(b.fullName);
        });
        const batters = data.players.filter(p => p.batting).sort((a,b) => a.fullName.localeCompare(b.fullName));

        const renderGroup = (title, group) => {
            const header = document.createElement('div');
            header.className = "section-header";
            header.innerText = title;
            listEl.appendChild(header);

            group.forEach(p => {
                const isHighlight = highlightedPlayers[teamCode]?.some(h => p.fullName.includes(h));
                const div = document.createElement('div');
                div.className = `player-line ${isHighlight ? 'highlight' : ''}`;
                
                let stats = "";
                if (p.pitching) {
                    const s = p.pitching;
                    stats = `<span class="stat-label">W-L:</span><span class="stat-value">${s.wins}-${s.losses}</span>
                             <span class="stat-label">G:</span><span class="stat-value">${s.games}</span>
                             <span class="stat-label">GS:</span><span class="stat-value">${s.gamesStarted}</span>
                             <span class="stat-label">IP:</span><span class="stat-value">${s.inningsPitched}</span>
                             <span class="stat-label">ERA:</span><span class="stat-value">${s.era}</span>
                             <span class="stat-label">WHIP:</span><span class="stat-value">${s.whip || 'N/A'}</span>
                             <span class="stat-label">K/9:</span><span class="stat-value">${s.k9}</span>
                             <span class="stat-label">CG:</span><span class="stat-value">${s.completeGames}</span>
                             <span class="stat-label">SHO:</span><span class="stat-value">${s.shutouts}</span>
                             <span class="stat-label">SV:</span><span class="stat-value">${s.saves}</span>`;
                } else {
                    const s = p.batting;
                    stats = `<span class="stat-label">AVG:</span><span class="stat-value">${s.avg}</span>
                             <span class="stat-label">HR:</span><span class="stat-value">${s.homeruns}</span>
                             <span class="stat-label">RBI:</span><span class="stat-value">${s.rbi}</span>
                             <span class="stat-label">HITS:</span><span class="stat-value">${s.hits}</span>`;
                }

                div.innerHTML = `#${p.jerseyNumber} ${p.position[0]} ${p.fullName} ${stats} 
                                 <span style="font-family:sans-serif; text-transform:none; font-size:10px; color:var(--accent)">
                                 ${p.summary} ${p.note}</span>`;
                listEl.appendChild(div);
            });
        };

        renderGroup("Pitchers", pitchers);
        renderGroup("Batters", batters);
    }

    init();
</script>
</body>
</html>
