<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Pro Tracker</title>
    <style>
        :root {
            --panel: #121426;
            --page-bg: #daecee;
            --border: #22d3ee;
            --text-light: #ffffff;
            --text-muted: #94a3b8;
            --diagnostic-bg: #000000;
        }

        body {
            background-color: var(--page-bg);
            font-family: 'Arial Black', sans-serif;
            text-transform: uppercase;
            margin: 0; padding: 20px; color: var(--text-light);
        }

        .panel {
            background-color: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px; margin-bottom: 20px;
        }

        /* Diagnostic Console */
        #diagConsole {
            background: var(--diagnostic-bg);
            color: #00ff00;
            font-family: monospace;
            font-size: 11px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            border: 2px solid #333;
            margin-bottom: 20px;
            text-transform: none;
        }

        .team-buttons { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
        .team {
            background: transparent; border: 1px solid var(--border);
            color: var(--text-light); padding: 5px 8px; font-size: 10px;
            border-radius: 4px; cursor: pointer;
        }
        .team.active { background-color: var(--border); color: var(--panel); }

        .game-info { font-size: 14px; border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 15px; }
        .highlight { font-weight: bold; color: var(--border); border-left: 3px solid var(--border); padding-left: 5px; }
        
        .player-row { padding: 8px 0; border-bottom: 1px solid #1e293b; font-size: 12px; }
        .stats { font-family: sans-serif; text-transform: none; color: var(--text-muted); font-size: 11px; }
    </style>
</head>
<body>

<div class="panel">
    <div id="teamContainer" class="team-buttons"></div>
</div>

<div id="diagConsole">--- SYSTEM READY: WAITING FOR INPUT ---</div>

<div class="panel">
    <div id="currentGameHeader" class="game-info">SELECT A TEAM</div>
    <div id="playersList"></div>
</div>

<script type="module">
    import { highlightedPlayers } from './highlights.js';

    const teamMap = {
        "ARI": "Diamondbacks", "ATH": "Athletics", "ATL": "Braves", "BAL": "Orioles",
        "BOS": "Red Sox", "ChC": "Cubs", "ChW": "White Sox", "Cin": "Reds",
        "Cle": "Guardians", "Col": "Rockies", "Det": "Tigers", "Hou": "Astros",
        "KCR": "Royals", "LAA": "Angels", "LAD": "Dodgers", "Mia": "Marlins",
        "Mil": "Brewers", "Min": "Twins", "NYM": "Mets", "NYY": "Yankees",
        "Phi": "Phillies", "Pit": "Pirates", "SDP": "Padres", "SFG": "Giants",
        "Sea": "Mariners", "StL": "Cardinals", "Tam": "Rays", "Tex": "Rangers",
        "Tor": "Blue Jays", "Was": "Nationals"
    };

    const consoleEl = document.getElementById('diagConsole');

    function log(msg, type = "INFO") {
        const time = new Date().toLocaleTimeString();
        consoleEl.innerHTML += `<div>[${time}] [${type}] ${msg}</div>`;
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    async function getSchedule() {
        const cacheKey = 'mlb_schedule_cache';
        let data = sessionStorage.getItem(cacheKey);
        
        if (data) {
            log("LOADED SCHEDULE FROM SESSION CACHE");
            return JSON.parse(data);
        }

        log("FETCHING NEW SCHEDULE FROM NETLIFY...", "CALL");
        const today = new Date().toISOString().split('T')[0];
        // Look back 7 days to ensure we catch the most recent completed/active game
        const startDate = new Date();
        startDate.setDate(startDate.getDate() - 7);
        const startStr = startDate.toISOString().split('T')[0];

        try {
            const url = `/.netlify/functions/get-schedule?startDate=${startStr}&endDate=${today}`;
            const resp = await fetch(url);
            log(`SCHEDULE RESP: ${resp.status}`, resp.ok ? "SUCCESS" : "ERROR");
            data = await resp.json();
            sessionStorage.setItem(cacheKey, JSON.stringify(data));
            return data;
        } catch (e) {
            log(e.message, "CRITICAL");
        }
    }

    async function loadTeamFlow(teamCode) {
        log(`INITIALIZING FLOW FOR: ${teamCode}`);
        const schedule = await getSchedule();
        const teamName = teamMap[teamCode];
        
        // Find latest game for this team
        const allGames = schedule.dates ? schedule.dates.flatMap(d => d.games) : [];
        const teamGames = allGames.filter(g => 
            g.teams.home.team.name.includes(teamName) || 
            g.teams.away.team.name.includes(teamName)
        ).sort((a,b) => new Date(b.gameDate) - new Date(a.gameDate));

        if (teamGames.length === 0) {
            log(`NO GAMES FOUND FOR ${teamName} IN LAST 7 DAYS`, "WARN");
            document.getElementById('currentGameHeader').innerText = `NO RECENT GAMES FOR ${teamCode}`;
            return;
        }

        const latestGame = teamGames[0];
        log(`FOUND LATEST GAME: ${latestGame.gamePk} (${latestGame.teams.away.team.name} @ ${latestGame.teams.home.team.name})`);
        
        document.getElementById('currentGameHeader').innerHTML = `
            LATEST: ${latestGame.teams.away.team.name} (${latestGame.teams.away.score || 0}) @ 
            ${latestGame.teams.home.team.name} (${latestGame.teams.home.score || 0})<br>
            <small style="font-size:10px; color:var(--border)">${latestGame.venue.name} | ${new Date(latestGame.gameDate).toLocaleString()}</small>
        `;

        // AUTOMATICALLY TRIGGER SECOND CALL
        await fetchGameDetails(latestGame.gamePk, teamCode);
    }

    async function fetchGameDetails(gamePk, teamCode) {
        log(`FETCHING BOXSCORE FOR PK: ${gamePk}`, "CALL");
        try {
            const resp = await fetch(`/.netlify/functions/get-game-details?gamePk=${gamePk}`);
            log(`BOXSCORE RESP: ${resp.status}`, resp.ok ? "SUCCESS" : "ERROR");
            const data = await resp.json();
            renderStats(data, teamCode);
        } catch (e) {
            log(e.message, "CRITICAL");
        }
    }

    function renderStats(data, teamCode) {
        const teamName = teamMap[teamCode];
        const isHome = data.boxscore.teams.home.team.name.includes(teamName);
        const players = isHome ? data.boxscore.teams.home.players : data.boxscore.teams.away.players;
        
        const list = document.getElementById('playersList');
        list.innerHTML = "";

        Object.values(players).forEach(p => {
            const name = p.person.fullName;
            // Highlight check
            const isHighlighted = highlightedPlayers[teamCode]?.some(h => name.includes(h));
            const isPitcher = p.position.abbreviation === 'P';
            const stats = isPitcher ? p.seasonStats.pitching : p.seasonStats.batting;

            const row = document.createElement('div');
            row.className = `player-row ${isHighlighted ? 'highlight' : ''}`;
            
            let statLine = isPitcher 
                ? `ERA: ${stats.era} | IP: ${stats.inningsPitched} | W-L: ${stats.wins}-${stats.losses} | SV: ${stats.saves} | CG: ${stats.completeGames} | SHO: ${stats.shutouts}`
                : `AVG: ${stats.avg} | HR: ${stats.homeRuns} | RBI: ${stats.rbi} | HITS: ${stats.hits}`;

            row.innerHTML = `
                <div>#${p.jerseyNumber} ${name} (${p.position.abbreviation})</div>
                <div class="stats">${statLine}</div>
            `;
            list.appendChild(row);
        });
        log(`RENDERED ${Object.keys(players).length} PLAYERS FOR ${teamCode}`);
    }

    // Initialize UI
    const container = document.getElementById('teamContainer');
    Object.keys(teamMap).forEach(code => {
        const btn = document.createElement('div');
        btn.className = 'team';
        btn.innerText = code;
        btn.onclick = () => {
            document.querySelectorAll('.team').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadTeamFlow(code);
        };
        container.appendChild(btn);
    });

    // Default Load
    loadTeamFlow("ARI");
</script>
</body>
</html>
