<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB PRO TRACKER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');

        :root {
            --panel-bg: rgba(34, 211, 238, 0.3);
            --page-bg: #daecee;
            --accent: #22d3ee;
            --text-light: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            background: linear-gradient(135deg, #daecee 0%, #b8d9de 100%);
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 0; padding: 20px; color: var(--text-light);
        }

        .container { max-width: 1100px; margin: 0 auto; }

        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .team-buttons { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .team {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--accent);
            color: var(--text-light);
            padding: 8px 12px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
        }
        .team.active { background-color: var(--accent); color: #121426; }

        .section-header { 
            color: var(--text-light); 
            margin: 10px 0 15px 0; 
            font-size: 1.2rem; 
        }

        .player-line {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 0.75rem;
            line-height: 1.6;
        }
        
        /* Just bold, no glow/color */
        .highlight { font-weight: bold; color: #fff; }

        .stat-label { color: var(--accent); font-weight: bold; margin-right: 3px; }
        .stat-val { color: #fff; margin-right: 10px; }

        #diagLog {
            font-family: monospace;
            font-size: 10px;
            color: #00ff00;
            background: #000;
            height: 120px;
            overflow-y: auto;
            padding: 10px;
            text-transform: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div id="teamContainer" class="team-buttons"></div>
    </div>

    <div class="panel">
        <div class="section-header">Schedule</div>
        <div id="gamesList"></div>
    </div>

    <div class="panel">
        <div class="section-header">Team Roster & Statistics</div>
        <div id="playersList"></div>
    </div>

    <div class="panel">
        <div class="section-header" style="font-size: 0.8rem;">Log</div>
        <div id="diagLog">SYSTEM READY...</div>
    </div>
</div>

<script type="module">
    import { highlightedPlayers } from './highlights.js';

    const teamMap = {
        "ARI": { name: "Diamondbacks", id: 109 }, "ATH": { name: "Athletics", id: 133 },
        "ATL": { name: "Braves", id: 144 }, "BAL": { name: "Orioles", id: 110 },
        "BOS": { name: "Red Sox", id: 111 }, "ChC": { name: "Cubs", id: 112 },
        "ChW": { name: "White Sox", id: 145 }, "Cin": { name: "Reds", id: 113 },
        "Cle": { name: "Guardians", id: 114 }, "Col": { name: "Rockies", id: 115 },
        "Det": { name: "Tigers", id: 116 }, "Hou": { name: "Astros", id: 117 },
        "KCR": { name: "Royals", id: 118 }, "LAA": { name: "Angels", id: 108 },
        "LAD": { name: "Dodgers", id: 119 }, "Mia": { name: "Marlins", id: 146 },
        "Mil": { name: "Brewers", id: 158 }, "Min": { name: "Twins", id: 142 },
        "NYM": { name: "Mets", id: 121 }, "NYY": { name: "Yankees", id: 147 },
        "Phi": { name: "Phillies", id: 143 }, "Pit": { name: "Pirates", id: 134 },
        "SDP": { name: "Padres", id: 135 }, "SFG": { name: "Giants", id: 137 },
        "Sea": { name: "Mariners", id: 136 }, "StL": { name: "Cardinals", id: 138 },
        "Tam": { name: "Rays", id: 139 }, "Tex": { name: "Rangers", id: 140 },
        "Tor": { name: "Blue Jays", id: 141 }, "Was": { name: "Nationals", id: 120 }
    };

    const posMap = {
        "Pitcher": "P", "Catcher": "C", "First Base": "1B", "Second Base": "2B",
        "Third Base": "3B", "Shortstop": "SS", "Outfielder": "OF", "Left Field": "LF",
        "Center Field": "CF", "Right Field": "RF", "Designated Hitter": "DH"
    };

    const log = (msg) => {
        const el = document.getElementById('diagLog');
        el.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        el.scrollTop = el.scrollHeight;
    };

    let scheduleData = null;

    async function init() {
        const start = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
        const end = new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString().split('T')[0];
        
        const resp = await fetch(`/.netlify/functions/get-schedule?startDate=${start}&endDate=${end}`);
        scheduleData = await resp.json();

        setupButtons();
        loadTeamFlow("ARI");
    }

    function setupButtons() {
        const container = document.getElementById('teamContainer');
        Object.keys(teamMap).forEach(code => {
            const btn = document.createElement('div');
            btn.className = 'team' + (code === "ARI" ? ' active' : '');
            btn.innerText = code;
            btn.onclick = () => {
                document.querySelectorAll('.team').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadTeamFlow(code);
            };
            container.appendChild(btn);
        });
    }

    async function loadTeamFlow(teamCode) {
        const info = teamMap[teamCode];
        const games = scheduleData.dates ? scheduleData.dates.flatMap(d => d.games) : [];
        const filtered = games.filter(g => 
            g.teams.home.team.name.includes(info.name) || g.teams.away.team.name.includes(info.name)
        ).sort((a,b) => new Date(b.gameDate) - new Date(a.gameDate));

        const list = document.getElementById('gamesList');
        list.innerHTML = "";

        filtered.forEach(g => {
            const div = document.createElement('div');
            div.style.padding = "10px 0";
            const d = new Date(g.gameDate).toLocaleDateString();
            div.innerText = `${d} | ${g.teams.away.team.name} ${g.teams.away.score || 0} @ ${g.teams.home.team.name} ${g.teams.home.score || 0}`;
            list.appendChild(div);
        });

        if (filtered.length > 0) {
            fetchDetails(filtered[0].gamePk, teamCode);
        }
    }

    async function fetchDetails(gamePk, teamCode) {
        const teamId = teamMap[teamCode].id;
        try {
            const resp = await fetch(`/.netlify/functions/get-game-details?gamePk=${gamePk}&teamId=${teamId}`);
            const data = await resp.json();
            renderRoster(data.players, teamCode);
        } catch (e) { log(`Error: ${e.message}`); }
    }

    function renderRoster(players, teamCode) {
        const list = document.getElementById('playersList');
        list.innerHTML = "";

        const sorted = [...players].sort((a, b) => {
            if (!!a.pitching !== !!b.pitching) return a.pitching ? -1 : 1;
            return a.fullName.localeCompare(b.fullName);
        });

        sorted.forEach(p => {
            const isH = highlightedPlayers[teamCode]?.some(h => p.fullName.includes(h));
            const div = document.createElement('div');
            div.className = `player-line ${isH ? 'highlight' : ''}`;
            
            const displayPos = posMap[p.position] || p.position.charAt(0);
            let sHtml = "";

            if (p.pitching) {
                const s = p.pitching;
                sHtml = `<span class="stat-label">ERA:</span><span class="stat-val">${s.era}</span> <span class="stat-label">K/9:</span><span class="stat-val">${s.k9}</span>`;
            } else {
                const s = p.batting;
                sHtml = `<span class="stat-label">AVG:</span><span class="stat-val">${s.avg}</span> <span class="stat-label">HR:</span><span class="stat-val">${s.homeruns}</span>`;
            }

            div.innerHTML = `#${p.jerseyNumber || '??'} ${displayPos} | ${p.fullName} ${sHtml}`;
            list.appendChild(div);
        });
    }

    init();
</script>
</body>
</html>
