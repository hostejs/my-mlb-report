<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Scout | Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        /* Shimmering Navy Blue Class */
        .text-shimmer-navy {
            background: linear-gradient(90deg, #1e3a8a 0%, #3b82f6 50%, #1e3a8a 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shimmer 5s linear infinite;
            font-weight: 900;
        }
        body { background-color: #f8fafc; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 bg-slate-900 rounded-lg p-6 shadow-xl gap-4">
            <div>
                <h1 class="text-3xl font-black italic text-white tracking-tighter">MLB<span class="text-sky-400">SCOUT</span></h1>
                <p class="text-[10px] text-slate-400 font-mono uppercase tracking-widest">Decision Tracker & Pruned Diagnostic Feed</p>
            </div>
            <div class="flex items-center gap-3">
                <input type="date" id="date-picker" class="bg-slate-800 border border-slate-700 rounded px-3 py-1 text-sm text-sky-400">
                <button onclick="copyDump()" class="bg-sky-600 hover:bg-sky-500 text-white text-[10px] font-bold px-4 py-2 rounded uppercase transition-all">Copy AI Dump</button>
            </div>
        </header>

        <div id="game-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12"></div>

        <div class="border-t border-slate-200 pt-8">
            <h2 class="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-[0.2em]">Pruned Diagnostic Data Vault</h2>
            <textarea id="ai-dump" readonly class="w-full h-64 bg-slate-50 border border-slate-200 rounded-lg p-4 font-mono text-[10px] text-slate-700 shadow-inner focus:outline-none"></textarea>
        </div>
    </div>

    <script>
        const picker = document.getElementById('date-picker');
        picker.value = new Date().toISOString().split('T')[0];

        async function load(date = '') {
            const grid = document.getElementById('game-grid');
            const dump = document.getElementById('ai-dump');
            grid.innerHTML = `<div class="col-span-full text-center py-20 text-blue-900 font-mono text-xs uppercase animate-pulse">Syncing League Data...</div>`;

            try {
                const res = await fetch(`/.netlify/functions/get-mlb?date=${date}`);
                const data = await res.json();
                dump.value = JSON.stringify(data, null, 2);

                if (data.length === 0) {
                    grid.innerHTML = `<div class="col-span-full text-center py-20">No scheduled games.</div>`;
                    return;
                }

                grid.innerHTML = data.map(game => {
                    const renderPitcher = (team) => {
                        let html = '';
                        if (team.win) html += `<div class="text-shimmer-navy"><span class="text-[8px] uppercase opacity-70">Win:</span> ${team.win}</div>`;
                        if (team.loss) html += `<div class="text-shimmer-navy"><span class="text-[8px] uppercase opacity-70">Loss:</span> ${team.loss}</div>`;
                        if (team.save) html += `<div class="text-shimmer-navy mt-1"><span class="text-[8px] uppercase opacity-70">Save:</span> ${team.save}</div>`;
                        return html || `<span class="text-slate-300 italic">TBD</span>`;
                    };

                    return `
                        <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                            <div class="bg-gradient-to-r from-blue-900 to-slate-800 px-4 py-2 flex justify-between items-center">
                                <span class="text-[10px] font-bold text-white uppercase">${game.venue}</span>
                                <span class="text-[9px] font-black text-sky-300 uppercase">${game.status}</span>
                            </div>

                            <div class="p-5">
                                <div class="flex items-center justify-between mb-4">
                                    <div class="w-1/3">
                                        <div class="text-xs font-black text-slate-800 uppercase">${game.teams.away.name.split(' ').pop()}</div>
                                        <div class="text-3xl text-shimmer-navy">${game.scores.away}</div>
                                        <div class="text-[10px] text-shimmer-navy opacity-80 font-bold">${game.teams.away.record}</div>
                                    </div>
                                    <div class="text-slate-100 text-xl font-black italic">VS</div>
                                    <div class="w-1/3 text-right">
                                        <div class="text-xs font-black text-slate-800 uppercase">${game.teams.home.name.split(' ').pop()}</div>
                                        <div class="text-3xl text-shimmer-navy">${game.scores.home}</div>
                                        <div class="text-[10px] text-shimmer-navy opacity-80 font-bold">${game.teams.home.record}</div>
                                    </div>
                                </div>

                                <div class="grid grid-cols-2 gap-4 border-t border-slate-100 pt-4">
                                    <div class="text-[10px] leading-tight">${renderPitcher(game.teams.away)}</div>
                                    <div class="text-[10px] leading-tight text-right">${renderPitcher(game.teams.home)}</div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                grid.innerHTML = `<div class="col-span-full text-red-800 text-center font-mono py-10">ERROR PARSING DATA</div>`;
            }
        }

        picker.addEventListener('change', (e) => load(e.target.value));
        function copyDump() {
            const textarea = document.getElementById('ai-dump');
            textarea.select();
            document.execCommand('copy');
            alert('Pruned AI data copied.');
        }
        load(picker.value);
    </script>
</body>
</html>
