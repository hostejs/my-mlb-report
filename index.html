<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Scout | Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Dark Blue Luster Text */
        .text-luster {
            color: #1e3a8a; /* Deep Blue */
            text-shadow: 0.5px 0.5px 0px rgba(30, 58, 138, 0.1);
        }
        /* Overriding all base text to ensure "Everywhere else" is Dark Blue */
        body, p, div, span, label {
            color: #1e3a8a;
        }
    </style>
</head>
<body class="bg-white p-4">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 bg-slate-900 rounded-lg p-6 shadow-xl gap-4">
            <div>
                <h1 class="text-3xl font-black italic text-white tracking-tighter">MLB<span class="text-sky-400">SCOUT</span></h1>
                <p class="text-[10px] text-slate-400 font-mono uppercase tracking-widest text-center md:text-left">Decision Tracker & Diagnostic Feed</p>
            </div>
            
            <div class="flex items-center gap-3">
                <input type="date" id="date-picker" 
                       class="bg-slate-800 border border-slate-700 rounded px-3 py-1 text-sm text-sky-400 focus:outline-none">
                <button onclick="copyDump()" class="bg-sky-600 hover:bg-sky-500 text-white text-[10px] font-bold px-4 py-2 rounded uppercase transition-colors">Copy AI Dump</button>
            </div>
        </header>

        <div id="game-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
            </div>

        <div class="border-t border-slate-200 pt-8">
            <h2 class="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-[0.2em]">Diagnostic Data Vault (Full Return)</h2>
            <textarea id="ai-dump" readonly class="w-full h-64 bg-slate-50 border border-slate-200 rounded-lg p-4 font-mono text-[10px] text-luster shadow-inner focus:outline-none"></textarea>
        </div>
    </div>

    <script>
        const picker = document.getElementById('date-picker');
        picker.value = new Date().toISOString().split('T')[0];

        async function load(date = '') {
            const grid = document.getElementById('game-grid');
            const dump = document.getElementById('ai-dump');
            grid.innerHTML = `<div class="col-span-full text-center py-20 text-luster font-mono text-xs uppercase tracking-widest animate-pulse">Syncing League Data...</div>`;

            try {
                const res = await fetch(`/.netlify/functions/get-mlb?date=${date}`);
                const data = await res.json();
                dump.value = JSON.stringify(data, null, 2);

                if (data.length === 0) {
                    grid.innerHTML = `<div class="col-span-full text-center py-20 text-luster">No scheduled games for this date.</div>`;
                    return;
                }

                grid.innerHTML = data.map(game => {
                    const renderPitcher = (team) => {
                        if (!team.decisionPitcher && !team.save) return `<span class="text-luster opacity-40 italic">No decision data</span>`;
                        
                        let html = '';
                        if (team.isWinner) html += `<div class="text-luster font-black"><span class="text-[9px] uppercase opacity-60 mr-1">Win:</span> ${team.decisionPitcher}</div>`;
                        if (team.isLoser) html += `<div class="text-luster font-bold opacity-80"><span class="text-[9px] uppercase opacity-60 mr-1">Loss:</span> ${team.decisionPitcher}</div>`;
                        if (team.save) html += `<div class="text-luster font-medium mt-1"><span class="text-[9px] uppercase opacity-60 mr-1">Save:</span> <span class="text-[10px]">${team.save}</span></div>`;
                        return html;
                    };

                    return `
                        <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                            <div class="bg-slate-900 px-4 py-2 flex justify-between items-center">
                                <span class="text-[9px] font-black text-slate-300 uppercase tracking-tighter">${game.venue}</span>
                                <span class="text-[9px] font-bold ${game.status.includes('Final') ? 'text-white' : 'text-sky-400 animate-pulse'} uppercase">${game.status}</span>
                            </div>

                            <div class="p-5">
                                <div class="flex items-center justify-between mb-6">
                                    <div class="w-1/3">
                                        <div class="text-xs font-black text-luster uppercase tracking-tight">${game.teams.away.name.split(' ').pop()}</div>
                                        <div class="text-3xl font-black text-luster tracking-tighter">${game.scores.away}</div>
                                        <div class="text-[10px] text-luster font-bold opacity-70">${game.teams.away.record}</div>
                                    </div>
                                    <div class="text-slate-100 text-xl font-black italic">VS</div>
                                    <div class="w-1/3 text-right">
                                        <div class="text-xs font-black text-luster uppercase tracking-tight">${game.teams.home.name.split(' ').pop()}</div>
                                        <div class="text-3xl font-black text-luster tracking-tighter">${game.scores.home}</div>
                                        <div class="text-[10px] text-luster font-bold opacity-70">${game.teams.home.record}</div>
                                    </div>
                                </div>

                                <div class="grid grid-cols-2 gap-4 border-t border-slate-100 pt-4">
                                    <div class="text-[10px] leading-tight text-luster">
                                        ${renderPitcher(game.teams.away)}
                                    </div>
                                    <div class="text-[10px] leading-tight text-luster text-right">
                                        ${renderPitcher(game.teams.home)}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                grid.innerHTML = `<div class="col-span-full text-red-800 text-center font-mono py-10">ERROR: FAILED TO PARSE MLB API RESPONSE</div>`;
            }
        }

        picker.addEventListener('change', (e) => load(e.target.value));

        function copyDump() {
            const textarea = document.getElementById('ai-dump');
            textarea.select();
            document.execCommand('copy');
            alert('Full diagnostic data copied to clipboard.');
        }

        load(picker.value);
    </script>
</body>
</html>
