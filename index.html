<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Stats Tracker</title>
    <style>
        :root {
            --panel: #121426;
            --page-bg: #daecee;
            --border: #22d3ee;
            --text-light: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--page-bg);
            font-family: 'Arial Black', 'Gadget', sans-serif;
            text-transform: uppercase;
            margin: 0;
            padding: 20px;
            color: var(--text-light);
        }

        .container { max-width: 1200px; margin: 0 auto; }

        /* Banner & Buttons */
        .panel {
            background-color: var(--panel);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .team-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .team {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 5px 10px;
            font-size: 0.7rem;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .team.active, .team:hover {
            background-color: var(--border);
            color: var(--panel);
        }

        /* Headers */
        .games-header, .players-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            margin-bottom: 15px;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        /* Lists */
        .game, .player {
            padding: 10px;
            border-bottom: 1px solid #1e293b;
            font-size: 0.85rem;
        }

        .highlight { font-weight: bold; color: var(--border); }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 5px;
            text-transform: none;
            color: var(--text-muted);
            font-family: sans-serif;
        }
        
        .score-row { font-size: 1rem; color: var(--border); }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div id="teamContainer" class="team-buttons">
            </div>
    </div>

    <div class="panel">
        <div class="games-header">
            <div class="icon">📅</div>
            <div>Schedule & Scores</div>
        </div>
        <div id="gamesList">Loading games...</div>
    </div>

    <div id="statsSection" class="panel">
        <div class="players-header">
            <div class="icon">⚾</div>
            <div>Roster & Season Stats</div>
        </div>
        <div id="playersList">Select a game to view stats</div>
    </div>
</div>

<script type="module">
    import { highlightedPlayers } from './highlights.js';

    const teams = ["ARI","ATH","ATL","BAL","BOS","ChC","ChW","Cin","Cle","Col","Det","Hou","KCR","LAA","LAD","Mia","Mil","Min","NYM","NYY","Phi","Pit","SDP","SFG","Sea","StL","Tam","Tex","Tor","Was"];
    let currentTeam = "ARI";

    // Setup Buttons
    const btnContainer = document.getElementById('teamContainer');
    teams.forEach(t => {
        const btn = document.createElement('div');
        btn.className = `team ${t === currentTeam ? 'active' : ''}`;
        btn.innerText = t;
        btn.onclick = () => {
            document.querySelectorAll('.team').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadTeamData(t);
        };
        btnContainer.appendChild(btn);
    });

    async function loadTeamData(teamCode) {
        currentTeam = teamCode;
        const gamesList = document.getElementById('gamesList');
        gamesList.innerHTML = "Fetching schedule...";

        // Session Caching Logic
        const cacheKey = `mlb_games_${teamCode}`;
        let data = sessionStorage.getItem(cacheKey);

        if (!data) {
            const today = new Date().toISOString().split('T')[0];
            const nextWeek = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
            const resp = await fetch(`/.netlify/functions/get-schedule?startDate=${today}&endDate=${nextWeek}`);
            data = await resp.json();
            sessionStorage.setItem(cacheKey, JSON.stringify(data));
        } else {
            data = JSON.parse(data);
        }

        renderGames(data, teamCode);
    }

    function renderGames(data, teamCode) {
        const list = document.getElementById('gamesList');
        list.innerHTML = "";
        
        const games = data.dates.flatMap(d => d.games).filter(g => 
            g.teams.home.team.name.includes(teamCode) || g.teams.away.team.name.includes(teamCode)
        );

        if (games.length === 0) {
            list.innerHTML = "No games found for this period.";
            return;
        }

        games.forEach(g => {
            const div = document.createElement('div');
            div.className = "game";
            div.style.cursor = "pointer";
            div.innerHTML = `
                <div>${g.gameDate} - ${g.venue.name}</div>
                <div class="score-row">${g.teams.away.team.name} (${g.teams.away.score || 0}) @ ${g.teams.home.team.name} (${g.teams.home.score || 0})</div>
            `;
            div.onclick = () => loadGameStats(g.gamePk, teamCode);
            list.appendChild(div);
        });
    }

    async function loadGameStats(gamePk, teamCode) {
        const playerList = document.getElementById('playersList');
        playerList.innerHTML = "Loading roster stats...";

        const resp = await fetch(`/.netlify/functions/get-game-details?gamePk=${gamePk}`);
        const data = await resp.json();
        
        // Determine if selected team is home or away in this specific game
        const side = data.boxscore.teams.home.team.name.includes(teamCode) ? 'home' : 'away';
        const players = data.boxscore.teams[side].players;

        playerList.innerHTML = "";
        Object.values(players).forEach(p => {
            const isHighlighted = highlightedPlayers[teamCode]?.some(h => p.person.fullName.includes(h));
            const pos = p.position.abbreviation;
            const isPitcher = pos === 'P';
            
            const div = document.createElement('div');
            div.className = "player";
            
            let statsHtml = "";
            if (isPitcher) {
                const s = p.seasonStats.pitching;
                statsHtml = `ERA: ${s.era} | IP: ${s.inningsPitched} | W-L: ${s.wins}-${s.losses} | SV: ${s.saves}`;
            } else {
                const s = p.seasonStats.batting;
                statsHtml = `AVG: ${s.avg} | HR: ${s.homeRuns} | RBI: ${s.rbi} | H: ${s.hits}`;
            }

            div.innerHTML = `
                <div class="${isHighlighted ? 'highlight' : ''}">
                    #${p.jerseyNumber} ${p.person.fullName} (${pos})
                </div>
                <div class="stat-grid">${statsHtml}</div>
            `;
            playerList.appendChild(div);
        });
    }

    // Initial Load
    loadTeamData("ARI");
</script>
</body>
</html>
