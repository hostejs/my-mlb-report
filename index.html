<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap');

        :root {
            --panel-bg: rgba(18, 20, 38, 0.9);
            --page-bg: #daecee;
            --accent: #22d3ee;
            --text-light: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            background: #daecee;
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 0; padding: 20px; color: var(--text-light);
        }

        .container { max-width: 1100px; margin: 0 auto; }

        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .team-buttons { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .team {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--accent);
            color: var(--text-light);
            padding: 8px 12px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
        }
        .team.active { background-color: var(--panel-bg); color: var(--text-light); }

        .section-header { 
            color: var(--text-light); 
            margin: 10px 0 15px 0; 
            font-size: 1.2rem; 
        }

        .player-line {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 0.75rem;
            line-height: 1.6;
        }
        
        /* Just bold, no glow/color */
        .highlight { font-weight: bold; color: #fff; }

        .stat-label { color: var(--accent); margin-right: 3px; }
        .stat-val { color: #fff; margin-right: 10px; }        
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div id="teamContainer" class="team-buttons"></div>
    </div>

    <div class="panel">
        <div class="section-header" id="team-header"></div>
        <div id="gamesList"></div>
    </div>

    <div class="panel">
        <div class="section-header">Statistics</div>
        <div id="playersList"></div>
    </div>
</div>

<script type="module">
    import { highlightedPlayers } from './highlights.js';

    const teamMap = {
        "ARI": { name: "Diamondbacks", id: 109 }, "ATH": { name: "Athletics", id: 133 },
        "ATL": { name: "Braves", id: 144 }, "BAL": { name: "Orioles", id: 110 },
        "BOS": { name: "Red Sox", id: 111 }, "ChC": { name: "Cubs", id: 112 },
        "ChW": { name: "White Sox", id: 145 }, "Cin": { name: "Reds", id: 113 },
        "Cle": { name: "Guardians", id: 114 }, "Col": { name: "Rockies", id: 115 },
        "Det": { name: "Tigers", id: 116 }, "Hou": { name: "Astros", id: 117 },
        "KCR": { name: "Royals", id: 118 }, "LAA": { name: "Angels", id: 108 },
        "LAD": { name: "Dodgers", id: 119 }, "Mia": { name: "Marlins", id: 146 },
        "Mil": { name: "Brewers", id: 158 }, "Min": { name: "Twins", id: 142 },
        "NYM": { name: "Mets", id: 121 }, "NYY": { name: "Yankees", id: 147 },
        "Phi": { name: "Phillies", id: 143 }, "Pit": { name: "Pirates", id: 134 },
        "SDP": { name: "Padres", id: 135 }, "SFG": { name: "Giants", id: 137 },
        "Sea": { name: "Mariners", id: 136 }, "StL": { name: "Cardinals", id: 138 },
        "Tam": { name: "Rays", id: 139 }, "Tex": { name: "Rangers", id: 140 },
        "Tor": { name: "Blue Jays", id: 141 }, "Was": { name: "Nationals", id: 120 }
    };
    
    let scheduleData = null;

    async function init() {

        // Helper to get YYYY-MM-DD in LOCAL time, not UTC
        const getLocalDate = (dateObj) => {
            const year = dateObj.getFullYear();
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day = String(dateObj.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        const now = new Date();
        
        // 1. Current Date (April 8th)
        const endDateObj = new Date();
        endDateObj.setDate(now.getDate() + 1);
        const end = getLocalDate(endDateObj);

        // 2. Six days ago (April 2nd) to make the total range 7 days
        const startDateObj = new Date();
        startDateObj.setDate(now.getDate() - 6);
        const start = getLocalDate(startDateObj);
        
        const resp = await fetch(`/.netlify/functions/get-schedule?startDate=${start}&endDate=${end}`);
        scheduleData = await resp.json();

        setupButtons();
        loadTeamFlow("ARI");
    }

    function setupButtons() {
        const container = document.getElementById('teamContainer');
        Object.keys(teamMap).forEach(code => {
            const btn = document.createElement('div');
            btn.className = 'team' + (code === "ARI" ? ' active' : '');
            btn.innerText = code;
            btn.onclick = () => {
                document.querySelectorAll('.team').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadTeamFlow(code);
            };
            container.appendChild(btn);
        });
    }

    async function loadTeamFlow(teamCode) {
        const info = teamMap[teamCode];
        const games = scheduleData.dates ? scheduleData.dates.flatMap(d => d.games) : [];
        const filtered = games.filter(g => 
            g.teams.home.team.name.includes(info.name) || g.teams.away.team.name.includes(info.name)
        ).sort((a,b) => new Date(b.gameDate) - new Date(a.gameDate));

        const list = document.getElementById('gamesList');
        list.innerHTML = "";

        var startInd = 0;
        var plys = null;
        for (const g of filtered) {
            if (startInd == 0){                
                var team = g.teams.home.team.name.includes(info.name) ? g.teams.home.leagueRecord : g.teams.away.leagueRecord;
                const header = document.getElementById('team-header');
                header.innerHTML = `${info.name} | ${team.wins} - ${team.losses} ${team.pct}`;
                startInd = 1;
            }
            if (g.status.statusCode != "S" && plys === null){
                const data = await fetchDetails(g.gamePk, teamCode);   
                plys = data.players; // Save it so the next iteration skips this block
                renderRoster(plys, teamCode);
            }
            const div = document.createElement('div');
            div.style.padding = "10px 0";
            const d = new Date(g.gameDate).toLocaleDateString();
            div.innerHTML = `<span class="stat-label">${d} ${g.status.detailedState} ${g.venue.name}</span>${g.teams.away.team.name} ${g.teams.away.score || ''} @ ${g.teams.home.team.name} ${g.teams.home.score || ''}`;
            list.appendChild(div);
        }
    }

    async function fetchDetails(gamePk, teamCode) {
        const teamId = teamMap[teamCode].id;
        try {
            const resp = await fetch(`/.netlify/functions/get-game-details?gamePk=${gamePk}&teamId=${teamId}`);
            const data = await resp.json();
            return data;
        } catch (e) { log(`Error: ${e.message}`); }
    }

    function renderRoster(players, teamCode) {
        const list = document.getElementById('playersList');
        list.innerHTML = "";

        // Sort: Pitchers (GS first), then Batters
        const sorted = [...players].sort((a, b) => {
            if (!!a.pitching !== !!b.pitching) return a.pitching ? -1 : 1;
            if (a.pitching && b.pitching) return (b.pitching.gamesStarted || 0) - (a.pitching.gamesStarted || 0);
            return a.fullName.localeCompare(b.fullName);
        });

        sorted.forEach(p => {
            const isH = highlightedPlayers[teamCode]?.some(h => p.fullName.includes(h));
            const div = document.createElement('div');
            div.className = `player-line ${isH ? 'highlight' : ''}`;
            
            let sHtml = "";
            if (p.pitching) {
                const s = p.pitching;
                sHtml = `<span class="stat-val">(${s.wins}-${s.losses})</span>
                         <span class="stat-label">G:</span><span class="stat-val">${s.gamesPlayed}</span>
                         <span class="stat-label">GS:</span><span class="stat-val">${s.gamesStarted}</span>
                         <span class="stat-label">IP:</span><span class="stat-val">${s.inningsPitched}</span>
                         <span class="stat-label">ERA:</span><span class="stat-val">${s.era}</span>
                         <span class="stat-label">K/9:</span><span class="stat-val">${s.k9}</span>
                         <span class="stat-label">Whip:</span><span class="stat-val">${s.whip}</span>
                         <span class="stat-label">CG:</span><span class="stat-val">${s.completeGames}</span>
                         <span class="stat-label">SV:</span><span class="stat-val">${s.saves}</span>`;
            } else {
                const s = p.batting;
                sHtml = `<span class="stat-label">Games:</span><span class="stat-val">${s.gamesPlayed}</span>
                         <span class="stat-label">H:</span><span class="stat-val">${s.hits}</span>
                         <span class="stat-val">${s.avg}/${s.homeruns}/${s.rbi}</span>`;
            }

            div.innerHTML = `#${p.jerseyNumber} ${p.position} ${p.fullName} ${sHtml} <i style="text-transform:none; font-size:10px; color:var(--accent)">${p.summary || ''} ${p.note || ''}</i>`;
            list.appendChild(div);
        });
    }

    init();

</script>
</body>
</html>
