<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Daily Scout | Netlify Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">

    <header class="bg-slate-900 text-white p-6 shadow-xl">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-black italic">MLB<span class="text-sky-400">DATA</span>SCOUT</h1>
            <div class="flex gap-3">
                <input type="date" id="datePicker" class="text-slate-900 p-2 rounded font-bold text-sm outline-none">
                <button onclick="fetchGames()" class="bg-sky-500 hover:bg-sky-600 px-6 py-2 rounded-full font-bold shadow-lg">Process Date</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4">
        <div id="status" class="hidden mb-6 p-4 rounded bg-sky-100 text-sky-800 text-center animate-pulse font-bold">Connecting...</div>

        <section id="rawDumpSection" class="hidden mb-10">
            <div class="flex justify-between items-end mb-2">
                <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">AI Raw Buffer</h2>
                <button onclick="copyRaw()" class="text-xs font-bold text-sky-600 uppercase">Copy All →</button>
            </div>
            <textarea id="rawTextArea" class="w-full h-64 p-4 text-[11px] font-mono bg-slate-800 text-slate-300 rounded-xl" readonly></textarea>
        </section>

        <div id="gamesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <script>
        const d = new Date(); d.setDate(d.getDate() - 1);
        document.getElementById('datePicker').value = d.toISOString().split('T')[0];

        function copyRaw() { document.getElementById('rawTextArea').select(); document.execCommand('copy'); alert("Copied!"); }

        async function fetchGames() {
            const date = document.getElementById('datePicker').value;
            const status = document.getElementById('status');
            const container = document.getElementById('gamesContainer');
            const rawText = document.getElementById('rawTextArea');
            
            const SITE_URL = "https://my-mlb-report.netlify.app"; 
            
            status.classList.remove('hidden');
            container.innerHTML = '';
            document.getElementById('rawDumpSection').classList.add('hidden');

            try {
                const response = await fetch(`${SITE_URL}/.netlify/functions/get-mlb?date=${date}`);
                const games = await response.json();

                let buffer = `MLB SCOUT REPORT: ${date}\n==============================\n`;

                games.forEach(game => {
                    // Narrative Buffer
                    buffer += `\n[GAME]: ${game.headline}\n`;
                    buffer += `[VENUE]: ${game.venue}\n`;
                    buffer += `[RECORDS]: Away(${game.teams.away.record}) Home(${game.teams.home.record})\n`;
                    buffer += `[SCORE]: ${game.teams.away.name} ${game.teams.away.score} - ${game.teams.home.name} ${game.teams.home.score}\n`;
                    buffer += `[STORY]: ${game.narrative}\n`;
                    buffer += `------------------------------\n`;

                    // Visual Card
                    const card = document.createElement('div');
                    card.className = "bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden";
                    card.innerHTML = `
                        <div class="bg-slate-50 p-2 border-b text-[9px] font-black text-slate-400 flex justify-between uppercase">
                            <span>${game.status}</span>
                            <span>${game.venue}</span>
                        </div>
                        <div class="p-6">
                            <div class="flex justify-between items-center mb-4">
                                <div class="text-center w-5/12">
                                    <p class="text-[10px] text-slate-400">${game.teams.away.record}</p>
                                    <p class="text-xs font-bold truncate">${game.teams.away.name}</p>
                                    <p class="text-4xl font-black">${game.teams.away.score}</p>
                                </div>
                                <div class="text-slate-100 font-black italic text-xl">VS</div>
                                <div class="text-center w-5/12">
                                    <p class="text-[10px] text-slate-400">${game.teams.home.record}</p>
                                    <p class="text-xs font-bold truncate">${game.teams.home.name}</p>
                                    <p class="text-4xl font-black">${game.teams.home.score}</p>
                                </div>
                            </div>
                            <div class="border-t pt-4 text-[10px] text-slate-600">
                                <p class="mb-2 font-medium"><strong>Pitchers:</strong> ${game.teams.away.pitcher} / ${game.teams.home.pitcher}</p>
                                <p class="italic border-l-2 border-sky-400 pl-2 line-clamp-2">${game.headline}</p>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });

                rawText.value = buffer;
                document.getElementById('rawDumpSection').classList.remove('hidden');
                status.classList.add('hidden');

            } catch (err) {
                status.innerText = "Error fetching data.";
                console.error(err);
            }
        }
    </script>
</body>
</html>
