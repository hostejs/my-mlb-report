<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Scout | Diagnostic Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .stat-scroll::-webkit-scrollbar { height: 4px; }
        .stat-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        @keyframes pulse-border { 0% { border-color: #0ea5e9; } 50% { border-color: #334155; } 100% { border-color: #0ea5e9; } }
        .loading-active { animation: pulse-border 2s infinite; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans pb-12">

    <header class="bg-slate-900 border-b border-slate-800 p-6 no-print">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter text-white">MLB<span class="text-sky-500">SCOUT</span></h1>
                <p id="debug-line" class="text-[10px] text-slate-500 font-mono uppercase tracking-widest mt-1">Status: Ready</p>
            </div>
            <div class="flex items-center gap-3 bg-slate-800 p-1.5 rounded-lg border border-slate-700">
                <input type="date" id="datePicker" class="bg-slate-900 text-sky-400 p-2 rounded font-bold text-sm outline-none border border-slate-700">
                <button onclick="fetchGames()" class="bg-sky-600 hover:bg-sky-500 text-white px-6 py-2 rounded font-black text-xs uppercase shadow-lg transition transform active:scale-95">Run Diagnostics</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        
        <div id="status-box" class="hidden mb-8 p-6 rounded-xl bg-slate-900 border border-slate-800 shadow-2xl">
            <h3 class="text-[10px] font-black text-sky-500 uppercase mb-4 tracking-widest">Network Activity Log</h3>
            <div id="log-entries" class="font-mono text-[11px] space-y-2 text-slate-400">
                </div>
        </div>

        <section id="rawDumpSection" class="hidden mb-12">
            <div class="flex justify-between items-end mb-2">
                <h2 class="text-[10px] font-black text-sky-500 uppercase tracking-widest">Extracted Intelligence</h2>
                <button onclick="copyRaw()" class="text-[10px] font-bold text-slate-500 hover:text-white uppercase">Copy All ⎘</button>
            </div>
            <textarea id="rawTextArea" class="w-full h-48 p-4 text-[11px] font-mono bg-slate-900 text-slate-400 rounded-xl border border-slate-800 outline-none" readonly></textarea>
        </section>

        <div id="gamesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <script>
        const d = new Date(); d.setDate(d.getDate() - 1);
        document.getElementById('datePicker').value = d.toISOString().split('T')[0];

        function addLog(msg, type = 'info') {
            const logBox = document.getElementById('status-box');
            const container = document.getElementById('log-entries');
            logBox.classList.remove('hidden');
            const color = type === 'error' ? 'text-red-400' : (type === 'success' ? 'text-emerald-400' : 'text-sky-400');
            container.innerHTML += `<div class="${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        }

        async function fetchGames() {
            const date = document.getElementById('datePicker').value;
            const container = document.getElementById('gamesContainer');
            const rawText = document.getElementById('rawTextArea');
            const logEntries = document.getElementById('log-entries');
            
            // CONFIG: Make sure this exactly matches your Netlify domain
            const SITE_URL = "https://my-mlb-report.netlify.app"; 
            
            logEntries.innerHTML = '';
            container.innerHTML = '';
            document.getElementById('rawDumpSection').classList.add('hidden');
            document.getElementById('debug-line').innerText = "Status: Working...";

            addLog(`Initiating fetch for date: ${date}`);
            addLog(`Targeting: ${SITE_URL}/.netlify/functions/get-mlb`);

            // Use an AbortController to catch timeouts manually on the frontend
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000); // 15s frontend timeout

            try {
                const response = await fetch(`${SITE_URL}/.netlify/functions/get-mlb?date=${date}`, {
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                addLog(`Server responded with status: ${response.status} ${response.statusText}`);

                if (!response.ok) {
                    throw new Error(`HTTP Error: ${response.status}. This usually means the function crashed or timed out on Netlify's end.`);
                }

                addLog(`Parsing JSON payload...`);
                const games = await response.json();
                addLog(`Success! Received data for ${games.length} games.`, 'success');

                let buffer = `MLB SCOUT REPORT: ${date}\n==============================\n`;

                games.forEach(game => {
                    buffer += `\n[GAME]: ${game.headline}\n`;
                    game.teams.away.roster.forEach(p => buffer += `  - ${p.name} (${p.pos}): ${p.stats}\n`);
                    game.teams.home.roster.forEach(p => buffer += `  - ${p.name} (${p.pos}): ${p.stats}\n`);
                    buffer += `------------------------------\n`;

                    const card = document.createElement('div');
                    card.className = "bg-slate-900 border border-slate-800 rounded-xl overflow-hidden flex flex-col shadow-xl loading-active";
                    
                    const isFinished = game.status.includes("Final") || game.status.includes("Progress");

                    card.innerHTML = `
                        <div class="bg-slate-950 px-4 py-2 border-b border-slate-800 flex justify-between">
                            <span class="text-[9px] font-black text-sky-500 uppercase">${game.status}</span>
                            <span class="text-[9px] font-bold text-slate-500 truncate ml-4">${game.venue}</span>
                        </div>
                        <div class="p-5 flex-grow">
                            <div class="flex justify-between items-center mb-6 text-white text-center">
                                <div class="w-5/12"><p class="text-xs font-black">${game.teams.away.name}</p><p class="text-4xl font-black">${game.teams.away.score}</p></div>
                                <div class="text-slate-700 italic text-sm font-black">VS</div>
                                <div class="w-5/12"><p class="text-xs font-black">${game.teams.home.name}</p><p class="text-4xl font-black">${game.teams.home.score}</p></div>
                            </div>
                            ${isFinished ? `
                                <div class="stat-scroll flex gap-2 overflow-x-auto pb-2 border-t border-slate-800 pt-3">
                                    ${game.teams.away.roster.slice(0, 3).map(p => `<div class="flex-shrink-0 bg-slate-800 p-2 rounded text-[8px] border border-slate-700"><p class="font-bold text-sky-400">${p.name}</p><p class="text-slate-500">${p.stats}</p></div>`).join('')}
                                    ${game.teams.home.roster.slice(0, 3).map(p => `<div class="flex-shrink-0 bg-slate-800 p-2 rounded text-[8px] border border-slate-700"><p class="font-bold text-white">${p.name}</p><p class="text-slate-500">${p.stats}</p></div>`).join('')}
                                </div>
                            ` : `<p class="text-[10px] text-slate-500 italic border-t border-slate-800 pt-3 text-center">${game.headline}</p>`}
                        </div>
                        <a href="https://www.mlb.com/gameday/${game.id}" target="_blank" class="block w-full bg-slate-950 text-sky-500 text-center py-3 text-[9px] font-black uppercase hover:bg-sky-600 hover:text-white">Gameday</a>
                    `;
                    container.appendChild(card);
                });

                rawText.value = buffer;
                document.getElementById('rawDumpSection').classList.remove('hidden');
                document.getElementById('debug-line').innerText = "Status: Complete";

            } catch (err) {
                if (err.name === 'AbortError') {
                    addLog("Error: Request Timed Out. The Netlify function is taking too long (>15s) to process all the games.", 'error');
                } else if (err.message.includes('Failed to fetch')) {
                    addLog("Error: Failed to Fetch. This is usually a CORS issue or the site name is wrong.", 'error');
                } else {
                    addLog(`Error: ${err.message}`, 'error');
                }
                document.getElementById('debug-line').innerText = "Status: Failed";
            }
        }
    </script>
</body>
</html>
