<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Scout | Box Score & Deep Text</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print, #rawDumpSection { display: none; } }
        .game-card { break-inside: avoid; }
        .data-label { font-size: 0.65rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <header class="bg-slate-900 text-white p-6 shadow-xl no-print">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-black italic tracking-tighter">MLB<span class="text-sky-400">DATA</span>SCOUT</h1>
            <div class="flex items-center gap-3">
                <input type="date" id="datePicker" class="text-slate-900 p-2 rounded font-bold text-sm">
                <button onclick="fetchGames()" class="bg-sky-500 hover:bg-sky-600 px-6 py-2 rounded font-bold transition">Process</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <div id="status" class="hidden mb-6 p-4 rounded-lg bg-sky-100 text-sky-800 text-center animate-pulse font-bold">Connecting...</div>

        <section id="rawDumpSection" class="hidden mb-12">
            <div class="flex justify-between items-center mb-2">
                <h2 class="data-label">AI Analysis Buffer (Deep Data)</h2>
                <button onclick="copyRaw()" class="text-xs text-sky-600 font-bold uppercase tracking-tighter">Copy for AI →</button>
            </div>
            <textarea id="rawTextArea" class="w-full h-48 p-4 text-[11px] font-mono bg-slate-800 text-slate-300 rounded-xl border-none" readonly></textarea>
        </section>

        <div id="gamesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <script>
        const PROXY = "https://corsproxy.io/?";
        // Default to yesterday
        const d = new Date(); d.setDate(d.getDate() - 1);
        document.getElementById('datePicker').value = d.toISOString().split('T')[0];

        function copyRaw() { document.getElementById('rawTextArea').select(); document.execCommand('copy'); alert("Copied to clipboard!"); }

        async function fetchGames() {
    const date = document.getElementById('datePicker').value;
    const status = document.getElementById('status');
    const container = document.getElementById('gamesContainer');
    const rawText = document.getElementById('rawTextArea');

    status.innerText = "Syncing with Netlify Bouncer...";
    status.classList.remove('hidden');
    
    try {
        // REPLACE WITH YOUR ACTUAL NETLIFY URL
        const netlifyUrl = `https://YOUR-SITE-NAME.netlify.app/.netlify/functions/get-mlb?date=${date}`;
        const response = await fetch(netlifyUrl);
        const games = await response.json();

        container.innerHTML = '';
        let aiBuffer = `MLB SCOUT REPORT: ${date}\n==============================\n`;

        games.forEach(game => {
            // Add to AI Buffer
            aiBuffer += `\n[GAME]: ${game.headline}\n`;
            aiBuffer += `[SCORE]: ${game.teams.away.name} ${game.teams.away.score} - ${game.teams.home.name} ${game.teams.home.score}\n`;
            aiBuffer += `[STORY]: ${game.narrative}\n`;
            aiBuffer += `------------------------------\n`;

            // Create Card
            const card = document.createElement('div');
            card.className = "game-card bg-white p-5 rounded-xl shadow-sm border border-slate-200 mb-4";
            card.innerHTML = `
                <p class="text-[10px] font-bold text-slate-400 mb-1 uppercase">${game.status}</p>
                <h3 class="text-sm font-black text-blue-900 mb-3">${game.headline}</h3>
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-lg">
                    <div class="text-center">
                        <span class="block text-[10px] font-bold">${game.teams.away.name}</span>
                        <span class="text-xl font-black">${game.teams.away.score}</span>
                    </div>
                    <div class="text-slate-300 font-bold italic text-xs">VS</div>
                    <div class="text-center">
                        <span class="block text-[10px] font-bold">${game.teams.home.name}</span>
                        <span class="text-xl font-black">${game.teams.home.score}</span>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });

        rawText.value = aiBuffer;
        status.classList.add('hidden');
        document.getElementById('rawDumpSection').classList.remove('hidden');

    } catch (err) {
        status.innerText = "Connection Error. Check Netlify logs.";
        console.error(err);
    }
}
    </script>
</body>
</html>
