<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Morning Box</title>
    <style>
        :root { --line: #d1e5f0; --accent: #e63946; --text: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: #fdfdfd; padding: 15px; color: var(--text); line-height: 1.4; }
        .notebook { max-width: 600px; margin: auto; background: white; border-left: 6px solid var(--accent); padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 4px; }
        .header { font-size: 18px; font-weight: 800; color: var(--accent); border-bottom: 2px solid var(--accent); margin: 25px 0 10px; text-transform: uppercase; }
        .game { border-bottom: 1px solid var(--line); padding: 12px 0; }
        .team { display: flex; align-items: center; justify-content: space-between; font-weight: 600; margin-bottom: 3px; }
        .info { display: flex; align-items: center; gap: 8px; }
        .logo { width: 22px; height: 22px; }
        .stats { font-size: 12px; color: #555; font-style: italic; margin-left: 30px; }
        .score { font-family: monospace; font-size: 1.2em; color: #1d3557; }
        .headline { font-size: 12px; background: #f0f7ff; border-left: 3px solid #3498db; padding: 6px 10px; margin-top: 8px; color: #2980b9; font-weight: 500; border-radius: 0 4px 4px 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; font-size: 12px; margin-top: 10px; }
        .item { border-left: 2px solid #a8dadc; padding-left: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="notebook">
    <div class="header">Yesterday's Roundup</div>
    <div id="y-content">Loading scores...</div>
    <div class="header">Today's Starters</div>
    <div id="t-content" class="grid">Loading...</div>
    <div class="header">Tomorrow's Starters</div>
    <div id="tom-content" class="grid">Loading...</div>
</div>

<script>
    const API = "/mlb-api"; // Netlify Redirect path

    async function getGameDetails(gamePk) {
        try {
            const [content, live] = await Promise.all([
                fetch(`${API}/game/${gamePk}/content`).then(res => res.json()),
                fetch(`${API}/game/${gamePk}/feed/live`).then(res => res.json())
            ]);
            
            return {
                headline: content.editorial?.recap?.mlb?.headline || "",
                boxscore: live.liveData.boxscore
            };
        } catch (e) { return { headline: "", boxscore: null }; }
    }

    async function load() {
        const now = new Date();
        const fmt = (d) => d.toISOString().split('T')[0];
        const dates = {
            y: fmt(new Date(new Date().setDate(now.getDate() - 1))),
            t: fmt(now),
            tm: fmt(new Date(new Date().setDate(now.getDate() + 1)))
        };

        // 1. YESTERDAY
        const yData = await (await fetch(`${API}/schedule/games/?sportId=1&date=${dates.y}&hydrate=team,decisions(person)`)).json();
        let yHtml = "";
        
        if (yData.dates?.[0]) {
            for (const g of yData.dates[0].games) {
                const details = await getGameDetails(g.gamePk);
                
                // Extracting Pitcher Stats from Boxscore
                const getPitcherStats = (personId) => {
                    const players = details.boxscore?.teams;
                    if (!players) return "";
                    const p = players.away.players[`ID${personId}`] || players.home.players[`ID${personId}`];
                    if (!p || !p.seasonStats.pitching) return "";
                    const s = p.seasonStats.pitching;
                    return `${s.wins}-${s.losses} | ${s.era} ERA`;
                };

                const win = g.decisions?.winner;
                const loss = g.decisions?.loser;
                const save = g.decisions?.save;

                // Team Records
                const aRec = `(${g.teams.away.leagueRecord.wins}-${g.teams.away.leagueRecord.losses})`;
                const hRec = `(${g.teams.home.leagueRecord.wins}-${g.teams.home.leagueRecord.losses})`;

                // Pitcher Strings
                const wStr = win ? `W: ${win.fullName} (${getPitcherStats(win.id)})` : "W: N/A";
                const lStr = loss ? `L: ${loss.fullName} (${getPitcherStats(loss.id)})` : "L: N/A";
                const sStr = save ? `, S: ${save.fullName} (${details.boxscore?.teams.away.players[`ID${save.id}`]?.seasonStats.pitching.saves || details.boxscore?.teams.home.players[`ID${save.id}`]?.seasonStats.pitching.saves || '1'})` : "";

                yHtml += `
                <div class="game">
                    <div class="team"><div class="info"><img class="logo" src="https://www.mlbstatic.com/team-logos/${g.teams.away.team.id}.svg"> ${g.teams.away.team.name} ${aRec}</div><span class="score">${g.teams.away.score ?? 0}</span></div>
                    <div class="team"><div class="info"><img class="logo" src="https://www.mlbstatic.com/team-logos/${g.teams.home.team.id}.svg"> ${g.teams.home.team.name} ${hRec}</div><span class="score">${g.teams.home.score ?? 0}</span></div>
                    <div class="stats">${wStr} | ${lStr}${sStr}</div>
                    ${details.headline ? `<div class="headline">${details.headline}</div>` : ""}
                </div>`;
            }
        }
        document.getElementById('y-content').innerHTML = yHtml || "No games yesterday.";

        // 2. STARTERS
        async function fillStarters(date, containerId) {
            const data = await (await fetch(`${API}/schedule/games/?sportId=1&date=${date}&hydrate=team,probablePitcher(note)`)).json();
            let html = "";
            (data.dates?.[0]?.games || []).forEach(g => {
                const away = g.teams.away;
                const home = g.teams.home;
                const aP = away.probablePitcher ? `${away.probablePitcher.fullName}` : "TBD";
                const hP = home.probablePitcher ? `${home.probablePitcher.fullName}` : "TBD";
                html += `<div class="item"><strong>${away.team.name} @ ${home.team.name}</strong><br>${aP} vs ${hP}</div>`;
            });
            document.getElementById(containerId).innerHTML = html || "Off Day";
        }

        fillStarters(dates.t, 't-content');
        fillStarters(dates.tm, 'tom-content');
    }
    load();
</script>
</body>
</html>
