<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Scores</title>
    <style>
        :root { --line: #d1e5f0; --accent: #e63946; --text: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: #fdfdfd; padding: 15px; color: var(--text); line-height: 1.4; }
        .notebook { max-width: 600px; margin: auto; background: white; border-left: 6px solid var(--accent); padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 4px; }
        .header { font-size: 18px; font-weight: 800; color: var(--accent); border-bottom: 2px solid var(--accent); margin: 20px 0 10px; text-transform: uppercase; }
        .header:first-child { margin-top: 0; }
        .game { border-bottom: 1px solid var(--line); padding: 12px 0; }
        .team { display: flex; align-items: center; justify-content: space-between; font-weight: 600; margin-bottom: 3px; }
        .info { display: flex; align-items: center; gap: 8px; }
        .logo { width: 22px; height: 22px; }
        .stats { font-size: 12px; color: #666; font-style: italic; margin-left: 30px; }
        .score { font-family: monospace; font-size: 1.2em; color: #1d3557; }
        .headline { font-size: 12px; background: #f0f7ff; border-left: 3px solid #3498db; padding: 6px 10px; margin-top: 8px; color: #2980b9; font-weight: 500; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 12px; margin-top: 10px; }
        .item { border-left: 2px solid #a8dadc; padding-left: 8px; margin-bottom: 5px; }
    </style>
</head>
<body>
<div class="notebook">
    <div class="header">Yesterday's Roundup</div>
    <div id="y-content">Loading...</div>
    <div class="header">Today's Starters</div>
    <div id="t-content" class="grid">Loading...</div>
    <div class="header">Tomorrow's Starters</div>
    <div id="tom-content" class="grid">Loading...</div>
</div>

<script>
    // We call our own domain (/mlb-api) which Netlify proxies to statsapi.mlb.com
    const API = "/mlb-api";

    async function getHeadline(gamePk) {
        try {
            const res = await fetch(`${API}/game/${gamePk}/content`);
            const data = await res.json();
            return data.editorial?.recap?.mlb?.headline || "";
        } catch (e) { return ""; }
    }

    async function load() {
        const now = new Date();
        const fmt = (d) => d.toISOString().split('T')[0];
        const d = {
            y: fmt(new Date(new Date().setDate(now.getDate() - 1))),
            t: fmt(now),
            tm: fmt(new Date(new Date().setDate(now.getDate() + 1)))
        };

        // Yesterday
        const yData = await (await fetch(`${API}/schedule/games/?sportId=1&date=${d.y}&hydrate=team,decisions`)).json();
        let yHtml = "";
        if (yData.dates?.[0]) {
            for (const g of yData.dates[0].games) {
                const head = await getHeadline(g.gamePk);
                yHtml += `
                <div class="game">
                    <div class="team"><div class="info"><img class="logo" src="https://www.mlbstatic.com/team-logos/${g.teams.away.team.id}.svg">${g.teams.away.team.name}</div><span class="score">${g.teams.away.score??0}</span></div>
                    <div class="team"><div class="info"><img class="logo" src="https://www.mlbstatic.com/team-logos/${g.teams.home.team.id}.svg">${g.teams.home.team.name}</div><span class="score">${g.teams.home.score??0}</span></div>
                    <div class="stats">W: ${g.decisions?.winner?.fullName || 'N/A'} | L: ${g.decisions?.loser?.fullName || 'N/A'}${g.decisions?.save ? ', '+g.decisions.save.fullName+' SV' : ''}</div>
                    ${head ? `<div class="headline">${head}</div>` : ""}
                </div>`;
            }
        }
        document.getElementById('y-content').innerHTML = yHtml || "No games.";

        // Starters
        const fill = async (date, id) => {
            const data = await (await fetch(`${API}/schedule/games/?sportId=1&date=${date}&hydrate=probablePitcher`)).json();
            let h = "";
            (data.dates?.[0]?.games || []).forEach(g => {
                h += `<div class="item"><strong>${g.teams.away.team.teamName} @ ${g.teams.home.team.teamName}</strong><br>
                      ${g.teams.away.probablePitcher?.fullName || 'TBD'} vs ${g.teams.home.probablePitcher?.fullName || 'TBD'}</div>`;
            });
            document.getElementById(id).innerHTML = h || "None";
        };
        fill(d.t, 't-content');
        fill(d.tm, 'tom-content');
    }
    load();
</script>
</body>
</html>
