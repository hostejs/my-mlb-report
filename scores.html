<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Daily Notebook</title>
    <style>
        :root { --line: #d1e5f0; --accent: #e63946; --text: #2c3e50; --paper: #fdfdfd; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--paper); padding: 15px; color: var(--text); line-height: 1.2; }
        .notebook { max-width: 600px; margin: auto; background: white; border-left: 5px solid var(--accent); padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        .header { font-size: 16px; font-weight: 800; color: var(--accent); border-bottom: 2px solid var(--accent); margin: 20px 0 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .header:first-child { margin-top: 0; }

        .game { border-bottom: 1px solid var(--line); padding: 8px 0; }
        .team-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
        .team-info { display: flex; align-items: center; gap: 6px; font-weight: 600; font-size: 14px; }
        .record { font-size: 11px; color: #888; font-weight: 400; margin-left: 4px; }
        .logo { width: 18px; height: 18px; }
        .score { font-family: 'Courier New', monospace; font-size: 1.2em; font-weight: bold; color: #1d3557; }

        .pitcher-row { font-size: 11.5px; color: #555; margin-left: 24px; font-style: italic; margin-bottom: 4px; }
        .headline { font-size: 11.5px; background: #f0f7ff; border-left: 2px solid #3498db; padding: 4px 8px; margin-top: 4px; color: #2980b9; border-radius: 0 4px 4px 0; font-weight: 500; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 11px; margin-top: 8px; }
        .item { border-left: 2px solid #a8dadc; padding-left: 6px; padding-bottom: 4px; }
        .item strong { color: #1d3557; font-size: 11.5px; }
    </style>
</head>
<body>
<div class="notebook">
    <div class="header">Yesterday's Roundup</div>
    <div id="y-content">Fetching Boxscores...</div>

    <div class="header">Today's Starters</div>
    <div id="t-content" class="grid">...</div>

    <div class="header">Tomorrow's Starters</div>
    <div id="tom-content" class="grid">...</div>
</div>

<script>
    const API = "/mlb-api"; 

    async function fetchDetailedData(gamePk) {
        try {
            const [content, live] = await Promise.all([
                fetch(`${API}/game/${gamePk}/content`).then(res => res.json()),
                fetch(`${API}/game/${gamePk}/feed/live`).then(res => res.json())
            ]);
            return {
                headline: content.editorial?.recap?.mlb?.headline || "",
                decisions: live.liveData.decisions
            };
        } catch (e) { return { headline: "", decisions: {} }; }
    }

    async function load() {
        const now = new Date();
        const fmt = (d) => d.toISOString().split('T')[0];
        const dates = {
            y: fmt(new Date(new Date().setDate(now.getDate() - 1))),
            t: fmt(now),
            tm: fmt(new Date(new Date().setDate(now.getDate() + 1)))
        };

        // 1. YESTERDAY
        const yData = await (await fetch(`${API}/schedule/games/?sportId=1&date=${dates.y}&hydrate=team`)).json();
        let yHtml = "";
        
        if (yData.dates?.[0]) {
            for (const g of yData.dates[0].games) {
                const details = await fetchDetailedData(g.gamePk);
                const d = details.decisions;

                // Helper to format Pitcher: Name (W-L, ERA)
                const pFormat = (p) => p ? `${p.fullName} (${p.stats?.pitching?.wins || 0}-${p.stats?.pitching?.losses || 0}, ${p.stats?.pitching?.era || '-.--'})` : "N/A";
                
                const winStr = d.winner ? `W: ${pFormat(d.winner)}` : "W: TBD";
                const lossStr = d.loser ? `L: ${pFormat(d.loser)}` : "L: TBD";
                const saveStr = d.save ? ` | SV: ${d.save.fullName} (${d.save.stats?.pitching?.saves || 1})` : "";

                yHtml += `
                <div class="game">
                    <div class="team-row">
                        <div class="team-info">
                            <img class="logo" src="https://www.mlbstatic.com/team-logos/${g.teams.away.team.id}.svg">
                            ${g.teams.away.team.name} <span class="record">(${g.teams.away.leagueRecord.wins}-${g.teams.away.leagueRecord.losses})</span>
                        </div>
                        <span class="score">${g.teams.away.score ?? 0}</span>
                    </div>
                    <div class="team-row">
                        <div class="team-info">
                            <img class="logo" src="https://www.mlbstatic.com/team-logos/${g.teams.home.team.id}.svg">
                            ${g.teams.home.team.name} <span class="record">(${g.teams.home.leagueRecord.wins}-${g.teams.home.leagueRecord.losses})</span>
                        </div>
                        <span class="score">${g.teams.home.score ?? 0}</span>
                    </div>
                    <div class="pitcher-row">${winStr} | ${lossStr}${saveStr}</div>
                    ${details.headline ? `<div class="headline">${details.headline}</div>` : ""}
                </div>`;
            }
        }
        document.getElementById('y-content').innerHTML = yHtml || "No games found.";

        // 2. STARTERS (TODAY/TOMORROW)
        async function fill(date, id) {
            const data = await (await fetch(`${API}/schedule/games/?sportId=1&date=${date}&hydrate=team,probablePitcher`)).json();
            let h = "";
            (data.dates?.[0]?.games || []).forEach(g => {
                const aP = g.teams.away.probablePitcher?.fullName || "TBD";
                const hP = g.teams.home.probablePitcher?.fullName || "TBD";
                h += `
                <div class="item">
                    <strong>${g.teams.away.team.teamName} @ ${g.teams.home.team.teamName}</strong><br>
                    ${aP} vs ${hP}
                </div>`;
            });
            document.getElementById(id).innerHTML = h || "Off Day";
        }
        fill(dates.t, 't-content');
        fill(dates.tm, 'tom-content');
    }
    load();
</script>
</body>
</html>
