<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Scoreboard</title>
    <style>
        :root { --line: #d1e5f0; --accent: #e63946; --text: #2c3e50; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #fdfdfd; padding: 10px; color: var(--text); line-height: 1.2; }
        
        .dashboard { 
            display: flex; 
            max-width: 1200px; 
            margin: auto; 
            gap: 15px; 
            background: white; 
            border-left: 6px solid var(--accent); 
            padding: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            border-radius: 4px;
        }

        /* Scrunched Left Column for Yesterday */
        .yesterday-col { flex: 0 0 280px; border-right: 1px solid var(--line); padding-right: 10px; }
        
        /* Right Side columns for Today/Tomorrow */
        .upcoming-cols { flex: 1; display: flex; gap: 15px; }
        .day-section { flex: 1; min-width: 200px; }

        .header { font-size: 13px; font-weight: 800; color: var(--accent); border-bottom: 2px solid var(--accent); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .blue-header { color: var(--blue); border-bottom-color: var(--blue); }

        /* Scrunched Game Styling */
        .game { border-bottom: 1px solid #f5f5f5; padding: 5px 0; font-size: 11px; }
        .team { display: flex; align-items: center; justify-content: space-between; font-weight: 600; height: 18px; }
        .info { display: flex; align-items: center; gap: 6px; overflow: hidden; white-space: nowrap; }
        .logo { width: 16px; height: 16px; flex-shrink: 0; }
        .score { font-family: monospace; font-size: 1.1em; color: #1d3557; background: #f0f4f8; padding: 0 4px; border-radius: 2px; }
        .stats-line { font-size: 9px; color: #888; font-style: italic; margin-left: 22px; margin-top: 2px; display: block; line-height: 1; }

        /* Right Side Item Styling */
        .item { border-left: 2px solid #a8dadc; padding-left: 8px; margin-bottom: 8px; font-size: 10.5px; }
        .time { color: var(--accent); font-weight: bold; font-size: 9px; display: block; margin-bottom: 2px; }
        .pitchers { color: #666; font-size: 9.5px; margin-top: 2px; display: block; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="yesterday-col">
        <div class="header">Yesterday</div>
        <div id="y-content">Loading scores...</div>
    </div>

    <div class="upcoming-cols">
        <div class="day-section">
            <div class="header blue-header">Today</div>
            <div id="t-content">Loading...</div>
        </div>
        <div class="day-section">
            <div class="header blue-header">Tomorrow</div>
            <div id="tom-content">Loading...</div>
        </div>
    </div>
</div>

<script>
    const API = "/mlb-api"; // This routes to statsapi.mlb.com

    async function load() {
        // We use April 16, 2026 as the reference "Today"
        const dates = {
            y: "2026-04-15",
            t: "2026-04-16",
            tm: "2026-04-17"
        };

        try {
            // 1. Load Yesterday's Scores
            const yRes = await fetch(`${API}/v1/schedule/games/?sportId=1&date=${dates.y}&hydrate=team,decisions,person(stats(type=season))`);
            const yData = await yRes.json();
            let yHtml = "";

            if (yData.dates?.[0]) {
                yData.dates[0].games.forEach(g => {
                    const formatP = (p) => {
                        if (!p) return "N/A";
                        const s = p.seasonStats?.pitching;
                        return s ? `${p.fullName} (${s.wins}-${s.losses}, ${s.era})` : p.fullName;
                    };

                    const dec = g.decisions || {};
                    yHtml += `
                    <div class="game">
                        <div class="team">
                            <div class="info"><img class="logo" src="https://www.mlbstatic.com/team-logos/${g.teams.away.team.id}.svg"> ${g.teams.away.team.teamName}</div>
                            <span class="score">${g.teams.away.score??0}</span>
                        </div>
                        <div class="team">
                            <div class="info"><img class="logo" src="https://www.mlbstatic.com/team-logos/${g.teams.home.team.id}.svg"> ${g.teams.home.team.teamName}</div>
                            <span class="score">${g.teams.home.score??0}</span>
                        </div>
                        <span class="stats-line">W: ${formatP(dec.winner)} | L: ${formatP(dec.loser)}</span>
                    </div>`;
                });
            }
            document.getElementById('y-content').innerHTML = yHtml || "No games.";

            // 2. Load Upcoming Starters
            async function fillSchedule(date, elementId) {
                const res = await fetch(`${API}/v1/schedule/games/?sportId=1&date=${date}&hydrate=team,probablePitcher`);
                const data = await res.json();
                let html = "";
                
                if (data.dates?.[0]) {
                    data.dates[0].games.forEach(g => {
                        const time = new Date(g.gameDate).toLocaleTimeString([], {hour: 'numeric', minute:'2:digit'});
                        html += `
                        <div class="item">
                            <span class="time">${time}</span>
                            <strong>${g.teams.away.team.teamName} @ ${g.teams.home.team.teamName}</strong>
                            <span class="pitchers">${g.teams.away.probablePitcher?.fullName || 'TBD'} vs ${g.teams.home.probablePitcher?.fullName || 'TBD'}</span>
                        </div>`;
                    });
                }
                document.getElementById(elementId).innerHTML = html || "Off Day";
            }

            fillSchedule(dates.t, 't-content');
            fillSchedule(dates.tm, 'tom-content');

        } catch (err) {
            console.error(err);
            document.getElementById('y-content').innerHTML = "Error loading data.";
        }
    }

    load();
</script>
</body>
</html>
