<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Daily Notebook</title>
    <style>
        :root { --line: #d1e5f0; --accent: #e63946; --text: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: #fdfdfd; padding: 15px; color: var(--text); line-height: 1.4; }
        .notebook { max-width: 600px; margin: auto; background: white; border-left: 6px solid var(--accent); padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 4px; }
        .header { font-size: 18px; font-weight: 800; color: var(--accent); border-bottom: 2px solid var(--accent); margin: 25px 0 10px; text-transform: uppercase; }
        .game { border-bottom: 1px solid var(--line); padding: 12px 0; }
        .team { display: flex; align-items: center; justify-content: space-between; font-weight: 600; margin-bottom: 3px; }
        .info { display: flex; align-items: center; gap: 8px; }
        .logo { width: 22px; height: 22px; }
        .record { font-size: 11px; color: #888; font-weight: 400; margin-left: 4px; }
        .stats { font-size: 12px; color: #555; font-style: italic; margin-left: 30px; margin-top: 4px; }
        .score { font-family: monospace; font-size: 1.2em; color: #1d3557; }
        .headline { font-size: 12px; background: #f0f7ff; border-left: 3px solid #3498db; padding: 6px 10px; margin-top: 8px; color: #2980b9; font-weight: 500; border-radius: 0 4px 4px 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; font-size: 12px; margin-top: 10px; }
        .item { border-left: 2px solid #a8dadc; padding-left: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="notebook">
    <div class="header">Yesterday's Roundup</div>
    <div id="y-content">Loading scores...</div>
    <div class="header">Today's Starters</div>
    <div id="t-content" class="grid">Loading...</div>
    <div class="header">Tomorrow's Starters</div>
    <div id="tom-content" class="grid">Loading...</div>
</div>

<script>
    const API = "/mlb-api"; 

    async function getDecisionsAndHeadline(gamePk) {
        try {
            // v1.1 is required for the most accurate Live Feed data
            const [live, content] = await Promise.all([
                fetch(`/mlb-api/v1.1/game/${gamePk}/feed/live`).then(res => res.json()),
                fetch(`${API}/game/${gamePk}/content`).then(res => res.json())
            ]);

            const dec = live.liveData.decisions;
            const box = live.liveData.boxscore.teams;
            
            // This function finds the pitcher in the boxscore to get their SEASON stats
            const getPStat = (id) => {
                const player = box.away.players[`ID${id}`] || box.home.players[`ID${id}`];
                if (!player || !player.seasonStats) return "";
                const s = player.seasonStats.pitching;
                return `${s.wins}-${s.losses} | ${s.era} ERA`;
            };

            const w = dec.winner ? `W: ${dec.winner.fullName} (${getPStat(dec.winner.id)})` : "W: N/A";
            const l = dec.loser ? `L: ${dec.loser.fullName} (${getPStat(dec.loser.id)})` : "L: N/A";
            const s = dec.save ? `, S: ${dec.save.fullName} (${box.away.players[`ID${dec.save.id}`]?.seasonStats.pitching.saves || box.home.players[`ID${dec.save.id}`]?.seasonStats.pitching.saves || '1'})` : "";

            return {
                pitcherLine: `${w} | ${l}${s}`,
                headline: content.editorial?.recap?.mlb?.headline || ""
            };
        } catch (e) { 
            return { pitcherLine: "Stats unavailable", headline: "" }; 
        }
    }

    async function load() {
        const now = new Date();
        const fmt = (d) => d.toISOString().split('T')[0];
        const dates = {
            y: fmt(new Date(new Date().setDate(now.getDate() - 1))),
            t: fmt(now),
            tm: fmt(new Date(new Date().setDate(now.getDate() + 1)))
        };

        // Yesterday
        const yData = await (await fetch(`${API}/schedule/games/?sportId=1&date=${dates.y}&hydrate=team`)).json();
        let yHtml = "";
        
        if (yData.dates?.[0]) {
            for (const g of yData.dates[0].games) {
                const details = await getDecisionsAndHeadline(g.gamePk);
                
                yHtml += `
                <div class="game">
                    <div class="team">
                        <div class="info">
                            <img class="logo" src="https://www.mlbstatic.com/team-logos/${g.teams.away.team.id}.svg"> 
                            ${g.teams.away.team.name} <span class="record">(${g.teams.away.leagueRecord.wins}-${g.teams.away.leagueRecord.losses})</span>
                        </div>
                        <span class="score">${g.teams.away.score ?? 0}</span>
                    </div>
                    <div class="team">
                        <div class="info">
                            <img class="logo" src="https://www.mlbstatic.com/team-logos/${g.teams.home.team.id}.svg"> 
                            ${g.teams.home.team.name} <span class="record">(${g.teams.home.leagueRecord.wins}-${g.teams.home.leagueRecord.losses})</span>
                        </div>
                        <span class="score">${g.teams.home.score ?? 0}</span>
                    </div>
                    <div class="stats">${details.pitcherLine}</div>
                    ${details.headline ? `<div class="headline">${details.headline}</div>` : ""}
                </div>`;
            }
        }
        document.getElementById('y-content').innerHTML = yHtml || "No games yesterday.";

        // Starters
        async function fill(date, id) {
            const data = await (await fetch(`${API}/schedule/games/?sportId=1&date=${date}&hydrate=team,probablePitcher`)).json();
            let h = "";
            (data.dates?.[0]?.games || []).forEach(g => {
                h += `<div class="item"><strong>${g.teams.away.team.teamName} @ ${g.teams.home.team.teamName}</strong><br>
                      ${g.teams.away.probablePitcher?.fullName || 'TBD'} vs ${g.teams.home.probablePitcher?.fullName || 'TBD'}</div>`;
            });
            document.getElementById(id).innerHTML = h || "Off Day";
        }
        fill(dates.t, 't-content');
        fill(dates.tm, 'tom-content');
    }
    load();
</script>
</body>
</html>
