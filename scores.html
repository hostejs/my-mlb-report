<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Dashboard 2026 - Debug Mode</title>
    <style>
        :root { --line: #d1e5f0; --accent: #e63946; --text: #2c3e50; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #fdfdfd; padding: 5px; color: var(--text); margin: 0; }
        
        .dashboard { display: flex; width: 98vw; margin: 0 auto; gap: 10px; padding-top: 5px; }

        /* Left Section: Floating Game Boxes */
        .yesterday-main { flex: 1; background: white; border-left: 4px solid var(--accent); padding: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        #y-content { display: flex; flex-wrap: wrap; gap: 6px; }
        .game-card { flex: 0 1 190px; border: 1px solid #eee; padding: 5px; border-radius: 3px; font-size: 9px; background: #fff; }

        /* Right Section: Sequential Sidebar */
        .sidebar { flex: 0 0 220px; display: flex; flex-direction: column; gap: 10px; }
        .sidebar-section { background: white; border-left: 4px solid var(--blue); padding: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        .header { font-size: 11px; font-weight: 800; color: var(--accent); border-bottom: 1px solid var(--accent); margin-bottom: 6px; text-transform: uppercase; }
        .blue-header { color: var(--blue); border-bottom-color: var(--blue); }

        /* Typography */
        .team { display: flex; align-items: center; justify-content: space-between; font-weight: 700; height: 14px; }
        .logo { width: 14px; height: 14px; }
        .score { font-family: monospace; font-size: 10px; background: #f0f4f8; padding: 0 3px; border-radius: 2px; }
        .stats-line { font-size: 8.5px; color: #666; font-style: italic; margin-top: 3px; border-top: 1px solid #f0f0f0; padding-top: 2px; display: block; }
        .item { border-bottom: 1px solid #f5f5f5; padding: 4px 0; font-size: 9.5px; }

        /* DIAGNOSTICS PANEL */
        #debug-console { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #222; color: #0f0; font-family: monospace; 
            font-size: 10px; max-height: 100px; overflow-y: auto; 
            padding: 5px; border-top: 2px solid #e63946; z-index: 1000;
        }
        .err { color: #ff4d4d; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="yesterday-main">
        <div class="header">Yesterday's Results</div>
        <div id="y-content">Loading...</div>
    </div>

    <div class="sidebar">
        <div class="sidebar-section">
            <div class="header blue-header">Today</div>
            <div id="t-content">Loading...</div>
        </div>
        <div class="sidebar-section">
            <div class="header blue-header">Tomorrow</div>
            <div id="tom-content">Loading...</div>
        </div>
    </div>
</div>

<div id="debug-console">Console: Initializing...</div>

<script>
    // Point this to your Netlify function or redirect root
    const API_BASE = "/mlb-api"; 
    const consoleLog = document.getElementById('debug-console');

    function log(msg, isErr = false) {
        const span = document.createElement('div');
        if (isErr) span.className = 'err';
        span.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        consoleLog.appendChild(span);
        consoleLog.scrollTop = consoleLog.scrollHeight;
    }

    async function fetchData(url) {
        log(`Fetching: ${url}`);
        const response = await fetch(url);
        if (!response.ok) {
            throw new Error(`HTTP ${response.status} at ${url}`);
        }
        return await response.json();
    }

    async function load() {
        const dates = {
            y: "2026-04-15",
            t: "2026-04-16",
            tm: "2026-04-17"
        };

        try {
            // 1. Yesterday
            const yData = await fetchData(`${API_BASE}/v1/schedule/games/?sportId=1&date=${dates.y}&hydrate=team,decisions(person)`);
            let yHtml = "";
            
            if (yData.dates?.[0]) {
                yData.dates[0].games.forEach(g => {
                    const dec = g.decisions || {};
                    yHtml += `
                    <div class="game-card">
                        <div class="team">
                            <span><img class="logo" src="https://www.mlbstatic.com/team-logos/${g.teams.away.team.id}.svg"> ${g.teams.away.team.name}</span>
                            <span class="score">${g.teams.away.score??0}</span>
                        </div>
                        <div class="team">
                            <span><img class="logo" src="https://www.mlbstatic.com/team-logos/${g.teams.home.team.id}.svg"> ${g.teams.home.team.name}</span>
                            <span class="score">${g.teams.home.score??0}</span>
                        </div>
                        <span class="stats-line">W: ${dec.winner?.fullName || 'N/A'} | L: ${dec.loser?.fullName || 'N/A'}</span>
                    </div>`;
                });
            }
            document.getElementById('y-content').innerHTML = yHtml || "No games found.";

            // 2. Sidebar Sections
            const fill = async (date, id) => {
                const data = await fetchData(`${API_BASE}/v1/schedule/games/?sportId=1&date=${date}&hydrate=team,probablePitcher`);
                let html = "";
                if (data.dates?.[0]) {
                    data.dates[0].games.forEach(g => {
                        html += `
                        <div class="item">
                            <strong>${g.teams.away.team.name} @ ${g.teams.home.team.name}</strong><br>
                            ${g.teams.away.probablePitcher?.fullName || 'TBD'} vs ${g.teams.home.probablePitcher?.fullName || 'TBD'}
                        </div>`;
                    });
                }
                document.getElementById(id).innerHTML = html || "Off Day";
            };

            await Promise.all([fill(dates.t, 't-content'), fill(dates.tm, 'tom-content')]);
            log("Load Complete.");

        } catch (e) {
            log(e.message, true);
        }
    }

    load();
</script>
</body>
</html>
