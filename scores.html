<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Scoreboard</title>
    <style>
        :root { --line: #d1e5f0; --accent: #e63946; --text: #2c3e50; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #fdfdfd; padding: 5px; color: var(--text); line-height: 1.2; }
        
        .dashboard { 
            display: flex; 
            width: 98vw; /* Uses 98% of viewport width */
            margin: auto; 
            gap: 12px; 
            background: white; 
            border-left: 6px solid var(--accent); 
            padding: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            border-radius: 4px;
        }

        /* Layout Columns */
        .yesterday-col { flex: 0 0 320px; border-right: 1px solid var(--line); padding-right: 10px; }
        .upcoming-cols { flex: 1; display: flex; gap: 12px; }
        .day-section { flex: 1; min-width: 200px; }

        .header { font-size: 12px; font-weight: 800; color: var(--accent); border-bottom: 2px solid var(--accent); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .blue-header { color: var(--blue); border-bottom-color: var(--blue); }

        /* Game Styling (Yesterday) */
        .game { border-bottom: 1px solid #f5f5f5; padding: 4px 0; font-size: 10.5px; }
        .team { display: flex; align-items: center; justify-content: space-between; font-weight: 600; height: 16px; }
        .info { display: flex; align-items: center; gap: 5px; overflow: hidden; white-space: nowrap; }
        .logo { width: 14px; height: 14px; flex-shrink: 0; }
        .score { font-family: monospace; font-size: 1.1em; color: #1d3557; background: #f0f4f8; padding: 0 3px; border-radius: 2px; }
        .stats-line { font-size: 9px; color: #777; font-style: italic; margin-left: 19px; margin-top: 1px; display: block; }
        .headline { font-size: 9px; background: #f0f7ff; border-left: 2px solid #3498db; padding: 3px 6px; margin-top: 4px; color: #2980b9; border-radius: 0 2px 2px 0; }

        /* Starter Styling (Today/Tomorrow) */
        .item { border-left: 2px solid #a8dadc; padding-left: 6px; margin-bottom: 6px; font-size: 10px; }
        .time { color: var(--accent); font-weight: bold; font-size: 8.5px; display: block; }
        .pitchers { color: #555; font-size: 9px; margin-top: 1px; display: block; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="yesterday-col">
        <div class="header">Yesterday</div>
        <div id="y-content">Loading scores...</div>
    </div>

    <div class="upcoming-cols">
        <div class="day-section">
            <div class="header blue-header">Today</div>
            <div id="t-content">Loading...</div>
        </div>
        <div class="day-section">
            <div class="header blue-header">Tomorrow</div>
            <div id="tom-content">Loading...</div>
        </div>
    </div>
</div>

<script>
    const API = "/mlb-api"; // Netlify path

    async function getGameDetails(gamePk) {
        try {
            const res = await fetch(`${API}/v1/game/${gamePk}/content`);
            const data = await res.json();
            return data.editorial?.recap?.mlb?.headline || "";
        } catch (e) { return ""; }
    }

    async function load() {
        const now = new Date();
        const fmt = (d) => d.toISOString().split('T')[0];
        const dates = {
            y: fmt(new Date(new Date().setDate(now.getDate() - 1))),
            t: fmt(now),
            tm: fmt(new Date(new Date().setDate(now.getDate() + 1)))
        };

        try {
            // 1. YESTERDAY (Logic from original attached file)
            const yRes = await fetch(`${API}/v1/schedule/games/?sportId=1&date=${dates.y}&hydrate=team,decisions,person(stats(type=season))`);
            const yData = await yRes.json();
            let yHtml = "";
            
            if (yData.dates?.[0]) {
                for (const g of yData.dates[0].games) {
                    const headline = await getGameDetails(g.gamePk);
                    
                    const formatP = (p) => {
                        if (!p) return "N/A";
                        const s = p.seasonStats?.pitching;
                        return s ? `${p.fullName} (${s.wins}-${s.losses}, ${s.era})` : p.fullName;
                    };

                    yHtml += `
                    <div class="game">
                        <div class="team">
                            <div class="info"><img class="logo" src="https://www.mlbstatic.com/team-logos/${g.teams.away.team.id}.svg"> ${g.teams.away.team.name}</div>
                            <span class="score">${g.teams.away.score ?? 0}</span>
                        </div>
                        <div class="team">
                            <div class="info"><img class="logo" src="https://www.mlbstatic.com/team-logos/${g.teams.home.team.id}.svg"> ${g.teams.home.team.name}</div>
                            <span class="score">${g.teams.home.score ?? 0}</span>
                        </div>
                        <span class="stats-line">W: ${formatP(g.decisions?.winner)} | L: ${formatP(g.decisions?.loser)}</span>
                        ${headline ? `<div class="headline">${headline}</div>` : ""}
                    </div>`;
                }
            }
            document.getElementById('y-content').innerHTML = yHtml || "No games yesterday.";

            // 2. STARTERS (Logic from original attached file)
            async function fillSchedule(date, elementId) {
                const res = await fetch(`${API}/v1/schedule/games/?sportId=1&date=${date}&hydrate=team,probablePitcher`);
                const data = await res.json();
                let html = "";
                
                if (data.dates?.[0]) {
                    data.dates[0].games.forEach(g => {
                        const time = new Date(g.gameDate).toLocaleTimeString([], {hour: 'numeric', minute:'2-digit'});
                        html += `
                        <div class="item">
                            <span class="time">${time}</span>
                            <strong>${g.teams.away.team.name} @ ${g.teams.home.team.name}</strong>
                            <span class="pitchers">${g.teams.away.probablePitcher?.fullName || 'TBD'} vs ${g.teams.home.probablePitcher?.fullName || 'TBD'}</span>
                        </div>`;
                    });
                }
                document.getElementById(elementId).innerHTML = html || "Off Day";
            }

            fillSchedule(dates.t, 't-content');
            fillSchedule(dates.tm, 'tom-content');

        } catch (err) {
            console.error(err);
            document.getElementById('y-content').innerHTML = "Error loading data.";
        }
    }

    load();
</script>
</body>
</html>
